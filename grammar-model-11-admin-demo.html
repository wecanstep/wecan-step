<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grammar Model 11 — Admin Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top-bar{background:#1e293b;border-bottom:1px solid #334155;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:16px;font-weight:900;color:#fff}
.top-bar h1 span{color:#fbbf24}
.demo-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.top-actions{display:flex;gap:8px}
.btn{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-save{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.btn-reset{background:#334155;color:#94a3b8}
.btn-preview{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
.info-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:20px}
.info-card h2{font-size:14px;font-weight:900;color:#94a3b8;letter-spacing:.5px;margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-full{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:5px}
input,textarea,select{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;padding:9px 12px;font-size:13px;color:#e2e8f0;font-family:Arial,sans-serif;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2563eb}
textarea{resize:vertical;min-height:60px}
.q-list{display:flex;flex-direction:column;gap:12px}
.q-item{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.q-item-head{background:#0f172a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.q-num-badge{background:#2563eb;color:#fff;font-size:11px;font-weight:900;padding:3px 10px;border-radius:999px}
.q-item-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.opt-lbl{font-size:12px;font-weight:900;color:#64748b;flex-shrink:0;width:20px}
.correct-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f172a;border-radius:8px}
.correct-row label{margin:0;color:#94a3b8;font-size:12px}
select.correct-sel{width:auto;flex:1}
.toast{position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;font-size:14px;font-weight:800;padding:12px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(80px);opacity:0;transition:all .3s;z-index:100}
.toast.show{transform:translateY(0);opacity:1}
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:#94a3b8}
.stat strong{color:#fbbf24;display:block;font-size:20px;font-weight:900}
.modified-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%;display:inline-block;margin-left:6px}
@media(max-width:600px){.field-row,.opts-grid{grid-template-columns:1fr}.top-bar{flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Grammar Model 11 <span>— Admin Demo</span></h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="demo-badge">&#9881;&#65039; تجريبي فقط</span>

      <button class="btn btn-save" onclick="saveAll()">&#128190; حفظ التعديلات</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="stats-row">

    <div class="stat"><strong id="statKey" style="color:#60a5fa;font-size:12px;font-weight:700" id="lsKey">—</strong>مفتاح localStorage</div>
  </div>

  <div class="info-card">
    <h2>&#9997;&#65039; معلومات الكويز</h2>
    <div class="field-row">
      <div>
        <label>عنوان الكويز (AR)</label>

      </div>
      <div>
        <label>اسم الدرس في quizResults</label>

    </div>
  </div>

  <div class="info-card">

    <div class="q-list" id="qList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = "wcs_quiz_gm11";

var originalData = {"title":"Grammar Model 11","lesson":"Grammar Model 11","questions":[{"q":"61) If it rains tomorrow, I ------------- my raincoat.","opts":["wear","am wear","will wear","going to wear"],"ans":2,"exp":"First Conditional: If + present simple, will + verb."},{"q":"62) When you were in Paris last year, ---------- the Eiffel Tower?","opts":["have you visited","were you visit","did you visit","you visited"],"ans":2,"exp":"last year يدل على الماضي البسيط، وصيغة السؤال تكون did + subject + verb."},{"q":"63) Guided tours------------ be given by the Ministry of Information in the coming Jinadriah Festival next month.","opts":["will","ought","must to","could to"],"ans":0,"exp":"next month يدل على المستقبل، والصيغة الصحيحة: will be given."},{"q":"64) People over forty need ------------- regular check-ups at least once a year.","opts":["get","to get","getting","that they get"],"ans":1,"exp":"need + to + verb: need to get."},{"q":"65) King Abdul Aziz regained Riyadh --------- 1319 H.","opts":["at","in","on","to"],"ans":1,"exp":"نستخدم in مع السنوات: in 1319 H."},{"q":"66) Adam---------- a book now.","opts":["reads","reading","is reads","is reading"],"ans":3,"exp":"now يدل على المضارع المستمر: is reading."},{"q":"67) Now it is 10:00 PM. The train ----------- at 11:00 pm.","opts":["arriving","arrived","has arrived","will arrive"],"ans":3,"exp":"الحدث في المستقبل، لذلك نستخدم will arrive."},{"q":"68) If you promise to keep a secret, I ---------- you what happened.","opts":["tell","telling","will tell","would tell"],"ans":2,"exp":"First Conditional: If + present simple, will + verb."},{"q":"69) When I go to King Saud University Library, I usually ----------.","opts":["study","studied","will study","am studying"],"ans":0,"exp":"usually تدل على عادة، لذلك نستخدم المضارع البسيط study."},{"q":"70) Which is the BEST WAY to combine the two sentences?<br><em>\"There was a discussion in class today. It was very interesting.\"<\/em>","opts":["There was a discussion in class today, but it was very interesting.","Since it was very interesting, there was a discussion in class today.","It was very interesting the discussion in class today.","The discussion in class today was very interesting."],"ans":3,"exp":"أفضل دمج يحول الجملتين إلى جملة واحدة طبيعية وواضحة."},{"q":"71) Which of the following sentences has the CORRECT WORD ORDER?","opts":["A lot of protein both fish and meat contain, but the oils in fish than the fat in meat are healthier.","Fish and meat contain protein both a lot of, but in fish are healthier the oils than in meat the fat.","But in fish the oils are healthier than in meat the fat, a But in fish the oils lot of protein both fish and meat contain.","Both fish and meat contain a lot of protein, but the oils in fish are healthier than the fat in meat."],"ans":3,"exp":"الجملة الصحيحة تحافظ على ترتيب الفاعل ثم الفعل ثم المفعول والمقارنة بشكل طبيعي."},{"q":"72) In which of the following sentences is all PUNCTUATION correct?","opts":["After all, the exams are finished, whos going to be the first in the class.","After all the exams are finished, who's going to be the first in the class.","After all, the exam's are finished, whos' going to be the first in the class?","After all the exams are finished, who's going to be the first in the class?"],"ans":3,"exp":"الجملة الصحيحة تحتاج فاصلة بعد الجملة التابعة وعلامة سؤال في النهاية، وwho's صحيحة."},{"q":"73) Mary and Jane like ------------- to the science museum together.","opts":["go","going","they go","to be going"],"ans":1,"exp":"like + gerund: like going."},{"q":"74) Which of the following sentences has the CORRECT WORD ORDER?","opts":["Before buying a new computer, Susan waited until her paycheck was deposited into her bank account, for her parents.","Until her paycheck was deposited into her bank account, Susan waited for her parents, before buying a new computer.","Susan waited until her paycheck was deposited before buying a new computer for her parents, into her bank account.","Susan waited until her paycheck was deposited into her bank account before buying a new computer for her parents."],"ans":3,"exp":"الجملة الصحيحة ترتب الحدث والغاية والمكان بشكل واضح وطبيعي."},{"q":"75) Which of the following sentences has the CORRECT WORD ORDER?","opts":["He burned incense so that his house would smell nice, for an hour in the morning, through the rest of the day.","So that his house would smell nice, he burned incense for an hour in the morning, through the rest of the day.","Through the rest of the day he burned incense for an hour in the morning so that his house would smell nice","He burned incense for an hour in the morning so that his house would smell nice through the rest of the day."],"ans":3,"exp":"الجملة الصحيحة تضع الفعل ثم مدة الفعل ثم الغرض والنتيجة بشكل منطقي."},{"q":"76) Which one of the underlined words or phrases is INCORRECT?<br>I don't <u>had<\/u> enough money <u>to buy<\/u> a bus ticket, <u>so<\/u> I'll <u>have to<\/u> walk to school today.","opts":["had","to buy","so","have to"],"ans":0,"exp":"بعد don't نستخدم الفعل الأساسي have وليس had."},{"q":"77) Which of the underlined words or phrases is INCORRECT?<br>Last night, Lisa <u>makes<\/u> Vietnamese rice pudding <u>with<\/u> black-eyed peas <u>for<\/u> <u>dessert<\/u>.","opts":["makes","with","for","dessert"],"ans":0,"exp":"Last night يدل على الماضي، لذلك الصواب made وليس makes."},{"q":"78) Which sentence is correct?","opts":["Your appointment will be next Monday.","You're appointment will be next Monday.","You're appointment is next Monday.","Your appointment has next Monday."],"ans":0,"exp":"Your صفة ملكية صحيحة قبل appointment، والجملة بصيغة المستقبل صحيحة."},{"q":"79) If she had more talent, she ----------------- in art school.","opts":["enrolls","would enroll","had enrolled","is going to enroll"],"ans":1,"exp":"Second Conditional: If + past simple, would + verb."},{"q":"80) He did not have .…..money in his wallet, so he stopped by the cash machine.","opts":["lots","much","plenty","many"],"ans":1,"exp":"money اسم غير معدود، لذلك نستخدم much."},{"q":"81) A: Is it John's turn to start the game?<br>B: No, it isn't. It's -------------.","opts":["you","you're","your","yours"],"ans":3,"exp":"yours ضمير ملكية مستقل بمعنى دورك."},{"q":"82) The teacher will leave the classroom when her students --------- their exams.","opts":["finish","finished","finishes","finishing"],"ans":0,"exp":"بعد when مع معنى المستقبل نستخدم المضارع البسيط: finish."},{"q":"83) It takes -------------- of steel to build a skyscraper.","opts":["a lot","so much","too much","large amount"],"ans":0,"exp":"الصيغة الصحيحة: a lot of steel."},{"q":"84) The lady ------------ wrote this book lives in Riyadh.","opts":["which","whom","who","what"],"ans":2,"exp":"who تستخدم للفاعل العاقل: The lady who wrote."},{"q":"85) Which one of the underlined words or phrases is INCORRECT?<br><u>Either<\/u> the chocolate cake or the lemon pie <u>are going<\/u> to be served for dessert after dinner tonight. Which <u>one<\/u> do you <u>prefer<\/u>?","opts":["Either","are going","one","prefer"],"ans":1,"exp":"مع Either...or يتبع الفعل أقرب اسم، lemon pie مفرد، لذلك الصواب is going."},{"q":"86) Choose the CORRECT ORDER to make the following sentences into a paragraph:<br>1) Steve always took a bus home from work and then walked to his house.<br>2) He bought ice cream cones as a surprise for his family.<br>3) When he walked in the door, his family greeted him as usual.<br>4) On one hot day, he decided to stop by the store along his way home.<br>5) Then they all happily enjoyed the ice cream cones together.","opts":["(1), (2), (4), (3), (5)","(1), (3), (4), (2), (5)","(1), (4), (2), (3), (5)","(1), (4), (2), (5), (3)"],"ans":2,"exp":"الترتيب المنطقي: عادته في الرجوع، ثم توقف في يوم حار، اشترى الآيس كريم، دخل البيت، ثم استمتعوا به."},{"q":"87) Yusuf lost his entire research project ------------- his computer crashed.","opts":["so","when","during","although"],"ans":1,"exp":"when تربط الحدث بوقت حدوثه: عندما تعطل الكمبيوتر."},{"q":"88) In the game of Monopoly, if a player gets a \"go to jail card\", he…….. directly to jail.","opts":["must going","must to go","must go","must"],"ans":2,"exp":"must + verb بدون to: must go."},{"q":"89) Would someone please tell him the correct answer to the question that he………?","opts":["asked","asking","asked it","is asking it"],"ans":0,"exp":"that he asked تعني السؤال الذي سأله، ولا نضيف it بعد asked هنا."},{"q":"90) Airplanes usually travel -------------- helicopters.","opts":["faster than","fastest than","the fastest than","more faster than"],"ans":0,"exp":"صيغة المقارنة الصحيحة: faster than."},{"q":"91) We -------------- be brave in the face of danger.","opts":["must to","have","must","could to"],"ans":2,"exp":"must + verb للتعبير عن الوجوب: must be."},{"q":"92) He just --------- the bread that his father requested this morning.","opts":["buy","buying","bought","had bought"],"ans":2,"exp":"الجملة تخبر عن فعل حدث، والصيغة الصحيحة: just bought."},{"q":"93) Many Saudis enjoy eating Chinese food. However, they don't like it as……… as their traditional dishes.","opts":["plenty","much","many","more"],"ans":1,"exp":"as much as تستخدم للمقارنة مع شيء غير معدود/درجة التفضيل."},{"q":"94) If Sara ----------- earlier, she would not have missed the first lecture.","opts":["had arrived","arrived","has arrived","would arrive"],"ans":0,"exp":"Third Conditional: If + had + V3, would have + V3."},{"q":"95) All members of my family……the pilgrimage to Makkah at least once in their lives.","opts":["A. are performed","have performed","were performed","have been performed"],"ans":1,"exp":"المعنى مبني للمعلوم: أفراد العائلة أدوا الحج، لذلك have performed."},{"q":"96) Ali ------------- work and at present is having a cup of coffee with his friends.","opts":["just getting off","has just got off","is just get off","just gets off"],"ans":1,"exp":"الفعل حدث للتو وله أثر الآن، لذلك نستخدم present perfect: has just got off."},{"q":"97) The majority of smartphones ---------------- in factories in China.","opts":["produce","are producing","are produce","are produced"],"ans":3,"exp":"الجملة مبنية للمجهول: are produced."},{"q":"98) The strawberries ------------- by the children who picked them.","opts":["have all eating","were all eaten","were all eating","had all eaten"],"ans":1,"exp":"strawberries مفعول به، لذلك نستخدم المبني للمجهول في الماضي: were all eaten."},{"q":"99) Mr. Amir, -------------- the students call Uncle Amir, taught the boys physical education several times a week.","opts":["he","him","whom","which"],"ans":2,"exp":"whom تستخدم كمفعول به في الجملة الوصفية: the students call whom."},{"q":"100) If I ----------- more time, I -------------- more languages.","opts":["had / learn","have / learn","had / would learn","have / would learn"],"ans":2,"exp":"Second Conditional: If + past simple, would + verb."}]};

function loadData() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(originalData));
}

function buildUI() {
  var data = loadData();
  document.getElementById("metaTitle").value  = data.title  || "";
  document.getElementById("metaLesson").value = data.lesson || "";
  document.getElementById("statQ").textContent   = data.questions.length;
  document.getElementById("statKey").textContent = STORAGE_KEY;

  var list = document.getElementById("qList");
  list.innerHTML = "";

  data.questions.forEach(function(q, i) {
    var item = document.createElement("div");
    item.className = "q-item";
    item.id = "qi-" + i;

    var labels = ["A","B","C","D"];
    var optsHtml = "";
    (q.opts || []).forEach(function(opt, oi) {
      optsHtml += '<div class="opt-row"><span class="opt-lbl">' + labels[oi] + '</span><input type="text" id="opt-' + i + '-' + oi + '" value="' + esc(opt) + '" onchange="markModified(' + i + ')"></div>';
    });

    var correctOpts = "";
    (q.opts || []).forEach(function(_, oi) {
      correctOpts += '<option value="' + oi + '"' + (q.ans === oi ? " selected" : "") + '>' + labels[oi] + '</option>';
    });

    item.innerHTML =
      '<div class="q-item-head">' +
        '<span class="q-num-badge">Q' + (i+1) + '</span>' +
        '<span id="mod-' + i + '" style="display:none" class="modified-dot" title="معدّل"></span>' +
      '</div>' +
      '<div class="q-item-body">' +
        '<div class="field-full"><label>نص السؤال</label><textarea id="qt-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.q) + '</textarea></div>' +
        '<div class="opts-grid">' + optsHtml + '</div>' +
        '<div class="correct-row"><label>الإجابة الصحيحة:</label><select class="correct-sel" id="ans-' + i + '" onchange="markModified(' + i + ')">' + correctOpts + '</select></div>' +
        '<div class="field-full"><label>الشرح</label><textarea id="exp-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.exp || "") + '</textarea></div>' +
      '</div>';

    list.appendChild(item);
  });
  updateModCount();
}

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");\n}\n\nvar modifiedSet = {};\nfunction markModified(i) {\n  modifiedSet[i] = true;\n  document.getElementById("mod-" + i).style.display = "inline-block";\n  updateModCount();\n}\nfunction updateModCount() {\n  document.getElementById("statMod").textContent = Object.keys(modifiedSet).length;\n}\n\nfunction collectData() {\n  var data = loadData();\n  data.title  = document.getElementById("metaTitle").value.trim();\n  data.lesson = document.getElementById("metaLesson").value.trim();\n  data.questions.forEach(function(q, i) {\n    q.q   = document.getElementById("qt-" + i).value.trim();\n    q.ans = parseInt(document.getElementById("ans-" + i).value);\n    q.exp = document.getElementById("exp-" + i).value.trim();\n    (q.opts || []).forEach(function(_, oi) {\n      q.opts[oi] = document.getElementById("opt-" + i + "-" + oi).value.trim();\n    });\n  });\n  return data;\n}\n\nfunction saveAll() {\n  var data = collectData();\n  try {\n    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));\n    showToast("&#128190; تم الحفظ في localStorage بنجاح!");\n    modifiedSet = {};\n    document.querySelectorAll(".modified-dot").forEach(function(d){ d.style.display = "none"; });\n    updateModCount();\n  } catch(e) {\n    showToast("&#10060; خطأ في الحفظ: " + e.message);\n  }\n}\n\nfunction resetAll() {\n  if (!confirm("هل تريد استعادة البيانات الأصلية؟ سيتم حذف جميع التعديلات.")) return;\n  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}\n  modifiedSet = {};\n  buildUI();\n  showToast("&#10227; تم استعادة البيانات الأصلية");\n}\n\nfunction openPreview() {\n  saveAll();\n  window.open(QUIZ_FILE, "_blank");\n}\n\nfunction showToast(msg) {\n  var t = document.getElementById("toast");\n  t.innerHTML = msg;\n  t.classList.add("show");\n  setTimeout(function(){ t.classList.remove("show"); }, 2800);\n}\n\nbuildUI();\n</script>
</body>
</html>
