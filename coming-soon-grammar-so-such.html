<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>So / Such — قريبًا | WE CAN STEP</title>
<style>
:root{--navy:#173244;--navy2:#0b2035;--gold:#fbbf24;--bg:#eef2f7;--text:#1e293b;--muted:#64748b;--border:#dbe3ee}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(circle at top,#f8fafc 0,#eef2f7 48%,#e8edf4 100%);font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px}
.card{background:#fff;border:1px solid var(--border);border-radius:28px;box-shadow:0 24px 58px rgba(15,35,55,.12);padding:52px 28px;text-align:center;width:min(560px,100%);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#7c3aed,#4338ca)}
.logo{width:64px;height:64px;border-radius:18px;margin:0 auto 22px;background:#fff;box-shadow:0 10px 28px rgba(15,35,55,.12);display:flex;align-items:center;justify-content:center}
.logo svg{width:52px;height:52px}
.badge{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.28);color:#92400e;padding:8px 20px;border-radius:999px;font-size:15px;font-weight:900;margin-bottom:22px}
h1{font-size:36px;line-height:1.25;color:var(--navy);margin-bottom:22px;font-weight:950;direction:ltr}
.soon{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#7c3aed,#4338ca);color:#fff;border-radius:18px;padding:20px 36px;font-size:24px;font-weight:950;box-shadow:0 16px 34px rgba(67,56,202,.24);margin-bottom:26px}
p{font-size:20px;color:var(--muted);line-height:1.8;margin:0 auto 32px;max-width:460px}
p strong{color:var(--navy)}
.back{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:var(--navy);color:var(--gold);border-radius:18px;min-height:62px;padding:0 34px;font-size:18px;font-weight:950;box-shadow:0 14px 28px rgba(23,50,68,.22)}
@media(max-width:600px){.card{padding:48px 20px;border-radius:26px}h1{font-size:32px}p{font-size:18px}.soon{font-size:22px;padding:18px 30px}}
</style>
</head>
<body>
<section class="card">
  <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="white"/><text x="50" y="42" text-anchor="middle" font-size="11" font-family="Arial" font-weight="700" fill="#173244">WE CAN</text><text x="50" y="62" text-anchor="middle" font-size="16" font-family="Arial" font-weight="900" fill="#173244">STEP</text></svg></div>
  <div class="badge">Grammar Quiz 📝</div>
  <h1>So / Such</h1>
  <div class="soon">🚧 قريبًا</div>
  <p>سيتم إضافة كويز <strong>So / Such</strong> قريبًا.<br>ترقّب التحديثات القادمة من WE CAN STEP!</p>
  <a class="back" href="grammar-lessons.html">← العودة للدروس</a>
</section>
</body>
</html>
