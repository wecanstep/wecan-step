<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grammar Model 09 — Admin Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top-bar{background:#1e293b;border-bottom:1px solid #334155;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:16px;font-weight:900;color:#fff}
.top-bar h1 span{color:#fbbf24}
.demo-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.top-actions{display:flex;gap:8px}
.btn{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-save{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.btn-reset{background:#334155;color:#94a3b8}
.btn-preview{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
.info-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:20px}
.info-card h2{font-size:14px;font-weight:900;color:#94a3b8;letter-spacing:.5px;margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-full{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:5px}
input,textarea,select{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;padding:9px 12px;font-size:13px;color:#e2e8f0;font-family:Arial,sans-serif;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2563eb}
textarea{resize:vertical;min-height:60px}
.q-list{display:flex;flex-direction:column;gap:12px}
.q-item{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.q-item-head{background:#0f172a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.q-num-badge{background:#2563eb;color:#fff;font-size:11px;font-weight:900;padding:3px 10px;border-radius:999px}
.q-item-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.opt-lbl{font-size:12px;font-weight:900;color:#64748b;flex-shrink:0;width:20px}
.correct-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f172a;border-radius:8px}
.correct-row label{margin:0;color:#94a3b8;font-size:12px}
select.correct-sel{width:auto;flex:1}
.toast{position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;font-size:14px;font-weight:800;padding:12px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(80px);opacity:0;transition:all .3s;z-index:100}
.toast.show{transform:translateY(0);opacity:1}
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:#94a3b8}
.stat strong{color:#fbbf24;display:block;font-size:20px;font-weight:900}
.modified-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%;display:inline-block;margin-left:6px}
@media(max-width:600px){.field-row,.opts-grid{grid-template-columns:1fr}.top-bar{flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Grammar Model 09 <span>— Admin Demo</span></h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="demo-badge">&#9881;&#65039; تجريبي فقط</span>
    <div class="top-actions">
      <button class="btn btn-reset" onclick="resetAll()">&#10227; استعادة الأصلي</button>
      <button class="btn btn-preview" onclick="openPreview()">&#128065; معاينة الكويز</button>
      <button class="btn btn-save" onclick="saveAll()">&#128190; حفظ التعديلات</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="stats-row">
    <div class="stat"><strong id="statQ">0</strong>سؤال</div>
    <div class="stat"><strong id="statMod" style="color:#f59e0b">0</strong>معدّل</div>
    <div class="stat"><strong id="statKey" style="color:#60a5fa;font-size:12px;font-weight:700" id="lsKey">—</strong>مفتاح localStorage</div>
  </div>

  <div class="info-card">
    <h2>&#9997;&#65039; معلومات الكويز</h2>
    <div class="field-row">
      <div>
        <label>عنوان الكويز (AR)</label>
        <input type="text" id="metaTitle" placeholder="مثال: Grammar Model 05">
      </div>
      <div>
        <label>اسم الدرس في quizResults</label>
        <input type="text" id="metaLesson" placeholder="مثال: Grammar Model 5">
      </div>
    </div>
  </div>

  <div class="info-card">
    <h2>&#128203; الأسئلة</h2>
    <div class="q-list" id="qList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = "wcs_quiz_gm09";
var QUIZ_FILE   = "grammar-model-09.html";

var originalData = {"title":"Grammar Model 09","lesson":"Grammar Model 9","questions":[
  {q:"61. What……………. your father's job?",opts:["is","be","can","does"],ans:0,exp:"What is = ما هو؟ فعل الكون مع مفرد."},
  {q:"62. She always likes to visit London in the summer; London is……… favorite city.",opts:["she","her","hers","its"],ans:1,exp:"قبل اسم (favorite city) = صفة ملكية = her."},
  {q:"63. If they have the resources, they ………. a public.",opts:["built","had built","will build","would build"],ans:2,exp:"First Conditional: If + Present = will + base verb."},
  {q:"64. Hannah: Excuse me. I am looking for my backpack. Librarian: Could you tell me……….one is yours?",opts:["that","which","what","this"],ans:1,exp:"اختيار من بين محدد = which one."},
  {q:"65. In which sentence is all CAPITALIZATION correct?",opts:["Not all muslims speak Arabic or are from the middle east; Indonesia and Malaysia are two asian countries with millions of Citizens who practice Islam.","Not all Muslims speak Arabic or are from the middle East; Indonesia and Malaysia are two Asian Countries with Millions of citizens who practice Islam.","Not all muslims speak Arabic or are from the Middle East; Indonesia and Malaysia are Two Asian Countries with millions of citizens who practice islam.","Not all Muslims speak Arabic or are from the Middle East; Indonesia and Malaysia are two Asian countries with millions of citizens who practice Islam."],ans:3,exp:"Muslims، Middle East، Indonesia، Malaysia، Asian، Islam كلها أسماء علم تبدأ بحرف كبير."},
  {q:"66. Roger wanted……… a new phone.",opts:["buy","to buy","that he buys","that he will buy"],ans:1,exp:"want + to + infinitive = wanted to buy."},
  {q:"67. How did you respond when the policeman asked you……. him your driver's license?",opts:["give","to give","giving","to giving"],ans:1,exp:"ask + someone + to + verb = asked you to give."},
  {q:"68. Don't take that book. It's………………...",opts:["me","my","mine","myself"],ans:2,exp:"بعد It's يأتي ضمير ملكية مستقل = mine."},
  {q:"69. In which sentence is all PUNCTUATION correct?",opts:["Matt had a stressful day at work, so when he came home, he didn't want to talk to anyone.","Matt had a stressful day at work, so when he came home; he didn't want to talk to anyone.","Matt had a stressful day at work, so when he came home; he didn't want to talk to anyone.","Matt had a stressful day at work, so when he came home: he didn't want to talk to anyone."],ans:0,exp:"so + when clause + main clause = فاصلتان في المكانين الصحيحين."},
  {q:"70. Jack couldn't afford to buy that expensive watch………….",opts:["and he bought a cheaper one too.","so he bought a cheaper one instead.","until he bought a cheaper one instead.","although he bought a cheaper one too."],ans:1,exp:"نتيجة منطقية = so + instead بدلاً من الغالي."},
  {q:"71. Which sentence has the CORRECT WORD ORDER?",opts:["Mrs. Wilson put them away in the cupboard, after lunch was over, and washed the dishes, dried them.","After lunch was over, Mrs. Wilson washed the dishes, dried them, and put them away in the cupboard.","Mrs. Wilson washed the dishes, dried them, after lunch was over, and put them away in the cupboard.","Dried them, Mrs. Wilson put them away in the cupboard, after lunch was over, and washed the dishes."],ans:1,exp:"الظرف أولاً + Subject + أفعال متسلسلة بالترتيب المنطقي."},
  {q:"72. The water in the lake……………………. last winter.",opts:["freeze","froze","freezes","frozen"],ans:1,exp:"last winter = ماضي محدد = Past Simple = froze."},
  {q:"73. What are you doing………………. home?",opts:["in","at","to","on"],ans:1,exp:"at home = في المنزل."},
  {q:"74. Paul: I left my coat in the car. Will: here, you can borrow………………...",opts:["mine","my","our","it"],ans:0,exp:"يمكنك أن تستعير معطفي = mine (ضمير ملكية مستقل)."},
  {q:"75. Bob and Tom enjoyed ………… so much on the school trip.",opts:["ourselves","oneselves","theirselves","themselves"],ans:3,exp:"Bob and Tom = هما = themselves."},
  {q:"76. Sara: She told me……………. some new medication.",opts:["to take","taking","to taking","that I take"],ans:0,exp:"tell + someone + to + verb = told me to take."},
  {q:"77. When they……. their examinations, the students will go on summer holiday.",opts:["finish","finished","will finish","would finish"],ans:0,exp:"When + Present Simple للمستقبل = finish."},
  {q:"78. Because they had been out in the desert all day, they needed to drink ……water.",opts:["a","few","many","some"],ans:3,exp:"water = uncountable + جملة مثبتة = some."},
  {q:"79. In which sentence is all PUNCTUATION correct?",opts:["When I was younger my mother said my messy hair looked like a rat's nest.","When I was younger my mother said, my messy hair looked like a rats nest.","When I was younger. My mother said my messy hair looked like a rats' nest.","When I was younger, my mother said my messy hair looked like a rat's nest."],ans:3,exp:"فاصلة بعد عبارة ابتدائية + rat's nest (ملكية مفرد)."},
  {q:"80. In which sentence is all CAPITALIZATION correct?",opts:["At First, my eldest sister, Sara, wanted to study chemistry at King Saud University, but one of her professors, doctor Hilda, persuaded her to join the College of medicine after she finishes the First Semester in January.","At first, my eldest Sister, Sara, wanted to study Chemistry at King Saud University, but one of her Professors, doctor Hilda, persuaded her to join the College of medicine after she finishes the First Semester in January.","At first, my eldest sister, sara. wanted to study Chemistry at King saud university, but one of her Professors. Doctor Hilda, persuaded her to join the college of Medicine after she finishes the first semester in January.","At first, my eldest sister, Sara, wanted to study chemistry at King Saud University, but one of her professors, Doctor Hilda, persuaded her to join the College of Medicine after she finishes the first semester in January."],ans:3,exp:"Sara و Doctor Hilda و King Saud University و College of Medicine و January أسماء علم تبدأ بحرف كبير."},
  {q:"81. In which sentence is CAPITALIZATION correct?",opts:["This semester, Mark is taking Math, Geography, Geology, french, and english.","This semester, Mark is taking math, geography, geology, French, and English.","This Semester, Mark is taking Math, geography, geology, French, and English.","This Semester, Mark is taking Math, Geography, Geology, French, and English."],ans:1,exp:"اللغات (French، English) تبدأ بحرف كبير. المواد العلمية العامة (math، geography، geology) بحروف صغيرة."},
  {q:"82. Which one of the underlined words or phrases is INCORRECT?<br>Young children love <u>jump</u>, running, skipping, and tumbling to practice their glowing motor skills.",opts:["jump","their","Furthermore","over time"],ans:0,exp:"love + V-ing. الأفعال يجب أن تكون متوازية: jumping وليس jump."},
  {q:"83. Mary was too tired to watch television last night……. she went to bed early.",opts:["so","but","why","because"],ans:0,exp:"نتيجة = so she went to bed early."},
  {q:"84. In which sentence is all PUNCTUATION correct?",opts:["\"Watch out!\" the girl screamed at her sister. Who was about to walk straight into a pole.","\"Watch out!\" the girl screamed at her sister, who was about to walk; straight into a pole.","\"Watch out!\" the girl screamed at her sister, who was about to walk straight into a pole.","\"Watch out!\" the girl screamed, at her sister, who was about to walk straight into a pole?"],ans:2,exp:"who was about to walk... = relative clause يتصل بالجملة بفاصلة."},
  {q:"85. Which sentence has the CORRECT WORD ORDER?",opts:["He said he would like to travel, after he has finish his studies and paid off all of his debts, to China day.","He said he would like to travel to China one day, and paid off all of his debts, after he has finished his studies.","He said he would like to travel, and paid off all of his debts, to China one day after he has finished his studies.","He said he would like to travel to China one day, after he has finished his studies and paid off all of his debts."],ans:3,exp:"Main clause + destination + time + condition (after clause)."},
  {q:"86. In which sentence is all CAPITALIZATION correct?",opts:["Traveling south on King Fahad Road is the quickest route to Batha.","Traveling South on King Fahad road is the quickest route to Batha.","Travelling South on king Fahad Road is the quickest route to batha.","Travelling south on king fahad road is the quickest route to batha."],ans:0,exp:"King Fahad Road و Batha أسماء علم. south = اتجاه عام = حرف صغير."},
  {q:"87. Helen isn't here. She………. from her dental appointment yet.",opts:["wasn't return","won't return","not returned","hasn't returned"],ans:3,exp:"yet مع Present Perfect = hasn't returned."},
  {q:"88. Peter's mother kept looking at him while he………. lectured by his father.",opts:["is","been","has been","was being"],ans:3,exp:"while + Passive Past Continuous = was being lectured."},
  {q:"89. Writing long letters ………. very common a hundred years ago",opts:["is","was","has been","had been"],ans:1,exp:"a hundred years ago = ماضي محدد = was."},
  {q:"90. I really enjoy………….in malls.",opts:["to shop","going shop","shopping","to shopping"],ans:2,exp:"enjoy + V-ing = enjoy shopping."},
  {q:"91. The girl was holding the knife carefully because her parents……. her how to do it.",opts:["they shown","they show","had shown","have showed"],ans:2,exp:"Past Perfect في سياق الماضي = had shown."},
  {q:"92. As a rule, my father never……… out in the evenings.",opts:["went","goes","going","is going"],ans:1,exp:"As a rule = عادة = Present Simple = goes."},
  {q:"93. We……….in the hot sun for nearly an hour and the bus still has not come.",opts:["waited","are waiting","were waiting","have been waiting"],ans:3,exp:"for nearly an hour حتى الآن = Present Perfect Continuous = have been waiting."},
  {q:"94. Physics is the science which………. light, heat, sound and electricity.",opts:["studies","studying","study","is studying"],ans:0,exp:"the science (مفرد) + which = studies."},
  {q:"95. Eric wanted to stop to eat but the rest of the passengers on the bus wanted to keep …………until they reached their destination.",opts:["go","to go","going","to going"],ans:2,exp:"keep + V-ing = keep going."},
  {q:"96. Lexus cars ………. by a Japanese company.",opts:["are making","are make","are made","made"],ans:2,exp:"Passive Present Simple = are made."},
  {q:"97. The three boys seem……………everywhere together.",opts:["that they go","they will go","to go","going"],ans:2,exp:"seem + to + infinitive = seem to go."},
  {q:"98. If he…………harder, he would have passed his examinations.",opts:["works","will work","worked","had worked"],ans:3,exp:"Third Conditional = If + Past Perfect = had worked."},
  {q:"99. The nurse asked the lady how she…………. after taking the medication.",opts:["felt","feel","felling","has felt"],ans:0,exp:"Reported speech في الماضي = felt."},
  {q:"100. The lifeguard told the children………into the water because the waves were too high.",opts:["not go","no going","not to go","don't go"],ans:2,exp:"tell + someone + not to + verb = told them not to go."}
]};

function loadData() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(originalData));
}

function buildUI() {
  var data = loadData();
  document.getElementById("metaTitle").value  = data.title  || "";
  document.getElementById("metaLesson").value = data.lesson || "";
  document.getElementById("statQ").textContent   = data.questions.length;
  document.getElementById("statKey").textContent = STORAGE_KEY;

  var list = document.getElementById("qList");
  list.innerHTML = "";

  data.questions.forEach(function(q, i) {
    var item = document.createElement("div");
    item.className = "q-item";
    item.id = "qi-" + i;

    var labels = ["A","B","C","D"];
    var optsHtml = "";
    (q.opts || []).forEach(function(opt, oi) {
      optsHtml += '<div class="opt-row"><span class="opt-lbl">' + labels[oi] + '</span><input type="text" id="opt-' + i + '-' + oi + '" value="' + esc(opt) + '" onchange="markModified(' + i + ')"></div>';
    });

    var correctOpts = "";
    (q.opts || []).forEach(function(_, oi) {
      correctOpts += '<option value="' + oi + '"' + (q.ans === oi ? " selected" : "") + '>' + labels[oi] + '</option>';
    });

    item.innerHTML =
      '<div class="q-item-head">' +
        '<span class="q-num-badge">Q' + (i+1) + '</span>' +
        '<span id="mod-' + i + '" style="display:none" class="modified-dot" title="معدّل"></span>' +
      '</div>' +
      '<div class="q-item-body">' +
        '<div class="field-full"><label>نص السؤال</label><textarea id="qt-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.q) + '</textarea></div>' +
        '<div class="opts-grid">' + optsHtml + '</div>' +
        '<div class="correct-row"><label>الإجابة الصحيحة:</label><select class="correct-sel" id="ans-' + i + '" onchange="markModified(' + i + ')">' + correctOpts + '</select></div>' +
        '<div class="field-full"><label>الشرح</label><textarea id="exp-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.exp || "") + '</textarea></div>' +
      '</div>';

    list.appendChild(item);
  });
  updateModCount();
}

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");\n}\n\nvar modifiedSet = {};\nfunction markModified(i) {\n  modifiedSet[i] = true;\n  document.getElementById("mod-" + i).style.display = "inline-block";\n  updateModCount();\n}\nfunction updateModCount() {\n  document.getElementById("statMod").textContent = Object.keys(modifiedSet).length;\n}\n\nfunction collectData() {\n  var data = loadData();\n  data.title  = document.getElementById("metaTitle").value.trim();\n  data.lesson = document.getElementById("metaLesson").value.trim();\n  data.questions.forEach(function(q, i) {\n    q.q   = document.getElementById("qt-" + i).value.trim();\n    q.ans = parseInt(document.getElementById("ans-" + i).value);\n    q.exp = document.getElementById("exp-" + i).value.trim();\n    (q.opts || []).forEach(function(_, oi) {\n      q.opts[oi] = document.getElementById("opt-" + i + "-" + oi).value.trim();\n    });\n  });\n  return data;\n}\n\nfunction saveAll() {\n  var data = collectData();\n  try {\n    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));\n    showToast("&#128190; تم الحفظ في localStorage بنجاح!");\n    modifiedSet = {};\n    document.querySelectorAll(".modified-dot").forEach(function(d){ d.style.display = "none"; });\n    updateModCount();\n  } catch(e) {\n    showToast("&#10060; خطأ في الحفظ: " + e.message);\n  }\n}\n\nfunction resetAll() {\n  if (!confirm("هل تريد استعادة البيانات الأصلية؟ سيتم حذف جميع التعديلات.")) return;\n  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}\n  modifiedSet = {};\n  buildUI();\n  showToast("&#10227; تم استعادة البيانات الأصلية");\n}\n\nfunction openPreview() {\n  saveAll();\n  window.open(QUIZ_FILE, "_blank");\n}\n\nfunction showToast(msg) {\n  var t = document.getElementById("toast");\n  t.innerHTML = msg;\n  t.classList.add("show");\n  setTimeout(function(){ t.classList.remove("show"); }, 2800);\n}\n\nbuildUI();\n</script>
</body>
</html>
