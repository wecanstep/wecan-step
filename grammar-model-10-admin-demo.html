<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grammar Model 10 — Admin Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top-bar{background:#1e293b;border-bottom:1px solid #334155;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:16px;font-weight:900;color:#fff}
.top-bar h1 span{color:#fbbf24}
.demo-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.top-actions{display:flex;gap:8px}
.btn{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-save{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.btn-reset{background:#334155;color:#94a3b8}
.btn-preview{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
.info-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:20px}
.info-card h2{font-size:14px;font-weight:900;color:#94a3b8;letter-spacing:.5px;margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-full{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:5px}
input,textarea,select{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;padding:9px 12px;font-size:13px;color:#e2e8f0;font-family:Arial,sans-serif;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2563eb}
textarea{resize:vertical;min-height:60px}
.q-list{display:flex;flex-direction:column;gap:12px}
.q-item{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.q-item-head{background:#0f172a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.q-num-badge{background:#2563eb;color:#fff;font-size:11px;font-weight:900;padding:3px 10px;border-radius:999px}
.q-item-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.opt-lbl{font-size:12px;font-weight:900;color:#64748b;flex-shrink:0;width:20px}
.correct-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f172a;border-radius:8px}
.correct-row label{margin:0;color:#94a3b8;font-size:12px}
select.correct-sel{width:auto;flex:1}
.toast{position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;font-size:14px;font-weight:800;padding:12px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(80px);opacity:0;transition:all .3s;z-index:100}
.toast.show{transform:translateY(0);opacity:1}
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:#94a3b8}
.stat strong{color:#fbbf24;display:block;font-size:20px;font-weight:900}
.modified-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%;display:inline-block;margin-left:6px}
@media(max-width:600px){.field-row,.opts-grid{grid-template-columns:1fr}.top-bar{flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Grammar Model 10 <span>— Admin Demo</span></h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="demo-badge">&#9881;&#65039; تجريبي فقط</span>
    <div class="top-actions">
      <button class="btn btn-reset" onclick="resetAll()">&#10227; استعادة الأصلي</button>
      <button class="btn btn-preview" onclick="openPreview()">&#128065; معاينة الكويز</button>
      <button class="btn btn-save" onclick="saveAll()">&#128190; حفظ التعديلات</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="stats-row">
    <div class="stat"><strong id="statQ">0</strong>سؤال</div>
    <div class="stat"><strong id="statMod" style="color:#f59e0b">0</strong>معدّل</div>
    <div class="stat"><strong id="statKey" style="color:#60a5fa;font-size:12px;font-weight:700" id="lsKey">—</strong>مفتاح localStorage</div>
  </div>

  <div class="info-card">
    <h2>&#9997;&#65039; معلومات الكويز</h2>
    <div class="field-row">
      <div>
        <label>عنوان الكويز (AR)</label>
        <input type="text" id="metaTitle" placeholder="مثال: Grammar Model 05">
      </div>
      <div>
        <label>اسم الدرس في quizResults</label>
        <input type="text" id="metaLesson" placeholder="مثال: Grammar Model 5">
      </div>
    </div>
  </div>

  <div class="info-card">
    <h2>&#128203; الأسئلة</h2>
    <div class="q-list" id="qList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = "wcs_quiz_gm10";

var originalData = {"title":"Grammar Model 10","lesson":"Grammar Model 10","questions":[{"q":"61) Paul works --------------.","opts":["careful","carefully","more careful","most careful"],"ans":1,"exp":"works يصف الفعل؛ لذلك نستخدم الحال carefully."},{"q":"62) Muhammad: Are they your children? Ahmad: No, they aren't. they're………","opts":["Alis'","Ali's","Ali'z","Aliz"],"ans":1,"exp":"لإظهار الملكية مع الاسم المفرد Ali نستخدم Ali's."},{"q":"63) Which sentence has the CORRECT WORD Order ?","opts":["Did you finish your homework when?","When did you finish your homework?","Did your homework finish you when?","When you did finish your homework?"],"ans":1,"exp":"السؤال يبدأ بأداة السؤال When ثم الفعل المساعد did ثم الفاعل."},{"q":"64) \"How…………… do you study?\" the teacher asked him.","opts":["a little","few","far","long"],"ans":3,"exp":"How long تستخدم للسؤال عن مدة الوقت."},{"q":"65) At our local market, it is possible to buy………….. things, but people usually go there when they want to buy gold.","opts":["much","many","a lot","no"],"ans":1,"exp":"things اسم جمع معدود، لذلك نستخدم many."},{"q":"66) They……………….yesterday morning.","opts":["arrive","arrived","are arriving","were arrived"],"ans":1,"exp":"yesterday morning يدل على الماضي البسيط، لذلك نستخدم arrived."},{"q":"67) After graduating, Turki got a job as…………in the Ministry of Transport.","opts":["official","officials","a official","an official"],"ans":3,"exp":"official تبدأ بصوت متحرك، لذلك نستخدم an official."},{"q":"68) When I was 25 years old, I --------- lift 30 kilograms with one hand.","opts":["should","could","may","can"],"ans":1,"exp":"الحديث عن قدرة في الماضي، لذلك نستخدم could."},{"q":"69) Egyptians and Qataris ------------- speak Arabic.","opts":["any","two","both","each"],"ans":2,"exp":"عند الحديث عن شيئين معاً نستخدم both."},{"q":"70) The first time Bob met his aunt; he immediately began to tell her all about………….and what he enjoyed doing.","opts":["himself","him","he","she"],"ans":0,"exp":"المعنى: أخبرها عن نفسه، لذلك نستخدم himself."},{"q":"71) Excuse me, can you -------------- me the way to the police office?","opts":["to showing","showing","to show","show"],"ans":3,"exp":"بعد can يأتي الفعل الأساسي بدون to."},{"q":"72) Would you take out the garbage when you leave…………..party today?","opts":["for","for an","for one","for the"],"ans":3,"exp":"المعنى يشير إلى حفلة محددة، لذلك نستخدم the."},{"q":"73) The second half has already begun, so the game………in about 45 minutes.","opts":["finish","finished","will finish","has been finished"],"ans":2,"exp":"in about 45 minutes يدل على المستقبل، لذلك نستخدم will finish."},{"q":"74) This book ------------ for university students.","opts":["written","had written","being written","has been written"],"ans":3,"exp":"الجملة مبنية للمجهول في الزمن التام: has been written."},{"q":"75) Yesterday, all passengers…………free meal because of the flight delay.","opts":["receive","received","receiving","are receiving"],"ans":1,"exp":"Yesterday يدل على الماضي البسيط، لذلك نستخدم received."},{"q":"76) This old computer is broken! I ………………….. it.","opts":["replace","replacing","must replace","ought replace"],"ans":2,"exp":"must + verb للتعبير عن الضرورة."},{"q":"77) Have you seen my new book……………..?","opts":["where","nowhere","anywhere","everywhere"],"ans":2,"exp":"في السؤال نستخدم anywhere بمعنى في أي مكان."},{"q":"78) Which phrase correctly replaces the INCORRECT underlined phrase?<br>Mona: sorry, I can't join you tonight. Amy: Let's go swimming.","opts":["You tell we why?","How about swimming?","I very pleased to hear this.","OK, Maybe some other time."],"ans":3,"exp":"الرد المناسب على عدم القدرة على الانضمام هو: OK, Maybe some other time."},{"q":"79) Which phrase correctly replaces the INCORRECT underlined phrase?<br>Mr. Brown: Thank you very much. You have been of great help.<br>Carter: I'll tell you later.","opts":["Please take another","It was my pleasure","I am very sorry","Worry about it"],"ans":1,"exp":"الرد المناسب على الشكر هو It was my pleasure."},{"q":"80) We won't see Ali on Friday because he ……… into a new house next weekend.","opts":["moves","moving","is moving","has moved"],"ans":2,"exp":"للخطط المستقبلية المؤكدة نستخدم present continuous: is moving."},{"q":"81) I always ……………….. my grandmother on the weekend.","opts":["visit","visits","visiting","will to visit"],"ans":0,"exp":"I مع المضارع البسيط تأخذ الفعل بدون s: visit."},{"q":"82) Tom's mother asked him ……………. the dishes for her.","opts":["dry","to dry","drying","to drying"],"ans":1,"exp":"ask + object + to + verb = asked him to dry."},{"q":"83) Which phrase correctly replaces the INCORRECT underlined phrase?<br>Helen: I think I should go to work early tomorrow; I have some work to finish.<br>Emma: Why do you have to do that?","opts":["I very glad to hear that","Aren't you late already?","Did you plan for that?","That's a good idea"],"ans":3,"exp":"الرد المناسب على الاقتراح هو That's a good idea."},{"q":"84) Which one of the underlined words or phrases is INCORRECT?<br>Health authorities claim that one reason diseases get spread are that people do not wash their hands property after using.","opts":["claim","get spread","are that","after using"],"ans":2,"exp":"one reason مفرد، لذلك الصواب is that وليس are that."},{"q":"85) Which sentence has the CORRECT WORD ORDER?","opts":["Yuri Gagarin, the Russian cosmonaut, is remembered as the first human to fly into outer space, having spent one hour and forty-eight minutes in a complete orbit around the earth.","Around the earth, as the first human to fly into outer space, is remembered Yuri Gagarin, the Russian cosmonaut, having spent one hour and forty-eight minutes in a complete orbit.","Having spent one hour and forty-eight minutes in complete orbit around the earth.Yuri Gagarin, the Russian cosmonaut, as the first human to fly into outer space, is remembered.","As the first human to fly into outer space, is remembered Yuri Gagarin, the Russian cosmonaut having spent one hour and forty-eight minutes in complete orbit around the earth."],"ans":0,"exp":"الجملة الصحيحة تحافظ على ترتيب الفاعل والوصف والفكرة الأساسية بشكل طبيعي."},{"q":"86) Sara: I have 1.000 riyals, and that necklace costs 11000 riyals. I can't afford it. Mona: No, you can't. it's ------- expensive.","opts":["too","any","much","more"],"ans":0,"exp":"too expensive تعني غالي جداً لدرجة لا يمكن تحملها."},{"q":"87) Choose the CORRECT ORDER to make the following sentence into a paragraph:<br>1) Then, pour it into a cup with a teabag and wait a couple of minutes.<br>2) Now, you can remove the teabag and drink it.<br>3) First, you heat the water.<br>4) Making a cup of tea is easy.","opts":["(4), (3), (2), (1)","(4), (1), (2), (3)","(3), (1), (4), (2)","(4), (3), (1), (2)"],"ans":3,"exp":"الترتيب المنطقي: مقدمة، تسخين الماء، صبه على الشاي، ثم إزالة الكيس والشرب."},{"q":"88) To which sentence can we ADD THE FOLLOWING PHRASE?<br>Having always spent their money to help others, --------------<br>1) Sara and Ahmad were never able to save enough to perform their hajj.<br>2) Their granddaughter, Mona, was living in Makkah with her family.<br>3) She decided to invite them to come and stay with her.<br>4) Their pilgrimage would be possible at last, so the old folks were overjoyed.","opts":["1","2","3","4"],"ans":0,"exp":"العبارة تشرح سبب عدم قدرة Sara and Ahmad على الادخار للحج."},{"q":"89) Our boss ………………. important people every Tuesday.","opts":["meeting","was met","Is meet","meets"],"ans":3,"exp":"every Tuesday يدل على عادة، والفاعل مفرد، لذلك meets."},{"q":"90) Which of the following sentences has the CORRECT WORD ORDER?","opts":["In the world affected by climate change, Peru likely to be the most top three nations is rated among.","Among the top three nations us most likely Peru rated to be change affected by climate in the world.","Peru is rated among the top three nations likely to be most affected by climate change in the world.","Climate change in the world is most likely to be affected by Peru rated among the top three nations."],"ans":2,"exp":"الجملة الصحيحة تبدأ بالفاعل Peru ثم الفعل is rated ثم بقية المعنى بترتيب طبيعي."},{"q":"91) In which of the following sentences is all PUNCTUATION CORRECT?","opts":["Maryam was tired of walking around all day at the mall, however, when she saw the sale sign at her favorite store, she immediately felt energized.","Maryam was tired of walking around all day at the mall, however, when she saw the sale sign at her favorite store she immediately felt energized.","Maryam was tired of walking around all day at the mall; however, when she saw the sale sign at her favorite store, she immediately felt energized.","Maryam was tired of walking around all day at the mall; however, when she saw the sale sign at her favorite store she immediately felt energized."],"ans":2,"exp":"however بين جملتين مستقلتين تحتاج فاصلة منقوطة قبلها، وفاصلة بعد الجملة التابعة."},{"q":"92) How long …………..to fly from London to New York?","opts":["does it take","does it takes","is it takes","takes it"],"ans":0,"exp":"الصيغة الصحيحة للسؤال: How long does it take...?"},{"q":"93) If you had turned up the volume, I ……………. the TV much better.","opts":["would have heard","am hearing","could hear","heard"],"ans":0,"exp":"Third Conditional: If + had + V3, would have + V3."},{"q":"94) The boy, ……………….. bicycle was stolen, got a new one yesterday.","opts":["who","that","which","whose"],"ans":3,"exp":"whose تستخدم للملكية: whose bicycle."},{"q":"95) The man………….by a dog when he climbed over a wall and reached safely.","opts":["is being chased","has been chased","was being chased","have been chased"],"ans":2,"exp":"السياق في الماضي مع فعل مستمر مبني للمجهول: was being chased."},{"q":"96) Physic is the science which ………… light, heat, sound and electricity.","opts":["studies","studied","studying","is studying"],"ans":0,"exp":"science مفرد، لذلك الفعل في المضارع البسيط يأخذ s: studies."},{"q":"97) The pilot landed the plane safely despite the fault with…………..controls.","opts":["him","he","its","it"],"ans":2,"exp":"controls تعود على plane، لذلك نستخدم its."},{"q":"98) when Chris was living in Riyadh, he……….around the neighborhood every evening dinner.","opts":["used to jog","is jogging","has to jog","jogging"],"ans":0,"exp":"used to تعبر عن عادة في الماضي."},{"q":"99) the boy walked ………….. down the street.","opts":["calm","calmly","calmed","calming"],"ans":1,"exp":"walked فعل، ويحتاج حالاً لوصف طريقة المشي: calmly."},{"q":"100) ……………. we were not allowed to take the test, was annoying.","opts":["That","Since","After","Because."],"ans":0,"exp":"That clause يمكن أن تعمل كفاعل للجملة."}]};

function loadData() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(originalData));
}

function buildUI() {
  var data = loadData();
  document.getElementById("metaTitle").value  = data.title  || "";
  document.getElementById("metaLesson").value = data.lesson || "";
  document.getElementById("statQ").textContent   = data.questions.length;
  document.getElementById("statKey").textContent = STORAGE_KEY;

  var list = document.getElementById("qList");
  list.innerHTML = "";

  data.questions.forEach(function(q, i) {
    var item = document.createElement("div");
    item.className = "q-item";
    item.id = "qi-" + i;

    var labels = ["A","B","C","D"];
    var optsHtml = "";
    (q.opts || []).forEach(function(opt, oi) {
      optsHtml += '<div class="opt-row"><span class="opt-lbl">' + labels[oi] + '</span><input type="text" id="opt-' + i + '-' + oi + '" value="' + esc(opt) + '" onchange="markModified(' + i + ')"></div>';
    });

    var correctOpts = "";
    (q.opts || []).forEach(function(_, oi) {
      correctOpts += '<option value="' + oi + '"' + (q.ans === oi ? " selected" : "") + '>' + labels[oi] + '</option>';
    });

    item.innerHTML =
      '<div class="q-item-head">' +
        '<span class="q-num-badge">Q' + (i+1) + '</span>' +
        '<span id="mod-' + i + '" style="display:none" class="modified-dot" title="معدّل"></span>' +
      '</div>' +
      '<div class="q-item-body">' +
        '<div class="field-full"><label>نص السؤال</label><textarea id="qt-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.q) + '</textarea></div>' +
        '<div class="opts-grid">' + optsHtml + '</div>' +
        '<div class="correct-row"><label>الإجابة الصحيحة:</label><select class="correct-sel" id="ans-' + i + '" onchange="markModified(' + i + ')">' + correctOpts + '</select></div>' +
        '<div class="field-full"><label>الشرح</label><textarea id="exp-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.exp || "") + '</textarea></div>' +
      '</div>';

    list.appendChild(item);
  });
  updateModCount();
}

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");\n}\n\nvar modifiedSet = {};\nfunction markModified(i) {\n  modifiedSet[i] = true;\n  document.getElementById("mod-" + i).style.display = "inline-block";\n  updateModCount();\n}\nfunction updateModCount() {\n  document.getElementById("statMod").textContent = Object.keys(modifiedSet).length;\n}\n\nfunction collectData() {\n  var data = loadData();\n  data.title  = document.getElementById("metaTitle").value.trim();\n  data.lesson = document.getElementById("metaLesson").value.trim();\n  data.questions.forEach(function(q, i) {\n    q.q   = document.getElementById("qt-" + i).value.trim();\n    q.ans = parseInt(document.getElementById("ans-" + i).value);\n    q.exp = document.getElementById("exp-" + i).value.trim();\n    (q.opts || []).forEach(function(_, oi) {\n      q.opts[oi] = document.getElementById("opt-" + i + "-" + oi).value.trim();\n    });\n  });\n  return data;\n}\n\nfunction saveAll() {\n  var data = collectData();\n  try {\n    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));\n    showToast("&#128190; تم الحفظ في localStorage بنجاح!");\n    modifiedSet = {};\n    document.querySelectorAll(".modified-dot").forEach(function(d){ d.style.display = "none"; });\n    updateModCount();\n  } catch(e) {\n    showToast("&#10060; خطأ في الحفظ: " + e.message);\n  }\n}\n\nfunction resetAll() {\n  if (!confirm("هل تريد استعادة البيانات الأصلية؟ سيتم حذف جميع التعديلات.")) return;\n  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}\n  modifiedSet = {};\n  buildUI();\n  showToast("&#10227; تم استعادة البيانات الأصلية");\n}\n\nfunction openPreview() {\n  saveAll();\n  window.open(QUIZ_FILE, "_blank");\n}\n\nfunction showToast(msg) {\n  var t = document.getElementById("toast");\n  t.innerHTML = msg;\n  t.classList.add("show");\n  setTimeout(function(){ t.classList.remove("show"); }, 2800);\n}\n\nbuildUI();\n</script>
</body>
</html>
