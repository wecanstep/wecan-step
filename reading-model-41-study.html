<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Model 41 Study — WE CAN STEP</title>
<style>
:root{--navy:#173244;--navy2:#0b2035;--gold:#fbbf24;--gold2:#f59e0b;--bg:#eef2f7;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#dbe3ee;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--teal:#0f766e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}.ltr{direction:ltr;text-align:left}.rtl{direction:rtl;text-align:right}
.header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff;border-bottom:1px solid rgba(251,191,36,.24);box-shadow:0 10px 30px rgba(15,35,55,.18)}
.h-inner{max-width:1220px;margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;align-items:center;gap:12px;direction:ltr}.logo{width:46px;height:46px;border-radius:14px;background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:950;line-height:1.05;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.22);font-size:12px}.b-title{font-size:18px;font-weight:950;letter-spacing:2px}.b-title span{color:var(--gold)}.b-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;letter-spacing:0}.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-weight:850;font-size:12px;color:#fff}.pill.gold{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.3);color:#fde68a}
.btn{border:0;border-radius:14px;padding:11px 16px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:.18s}.btn:hover{transform:translateY(-1px);filter:brightness(1.02)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}.btn-navy{background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff}.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy2)}.btn-teal{background:linear-gradient(135deg,#0f766e,#14b8a6);color:#fff}.btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--border)}.btn-red{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.small{font-size:12px;padding:8px 12px;border-radius:11px}
.wrap{max-width:1220px;margin:auto;padding:22px 18px 90px}.hero{background:#fff;border:1px solid var(--border);border-radius:26px;padding:24px;box-shadow:0 12px 34px rgba(15,35,55,.08);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.hero h1{font-size:28px;color:var(--navy);font-weight:950;direction:ltr}.hero p{color:var(--muted);font-size:14px;margin-top:6px}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:#f8fafc;border:1px solid var(--border);border-radius:18px;padding:13px 16px;min-width:100px;text-align:center}.stat b{display:block;color:var(--navy);font-size:22px}.stat span{font-size:12px;color:var(--muted);font-weight:800}
.loading,.error{background:#fff;border:1px solid var(--border);border-radius:24px;padding:38px 22px;text-align:center;box-shadow:0 12px 34px rgba(15,35,55,.08)}.loading .spin{width:42px;height:42px;border-radius:50%;border:4px solid #e5e7eb;border-top-color:var(--gold2);margin:0 auto 14px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.error h2{color:var(--red);font-size:22px;margin-bottom:10px}.error p{color:var(--muted);line-height:1.8}
.passage-box{background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:0 10px 26px rgba(15,35,55,.06);overflow:hidden}.passage-title{background:linear-gradient(135deg,#0f766e,#16a34a);color:#fff;padding:15px 18px;font-weight:950;display:flex;align-items:center;justify-content:space-between;gap:12px}.passage-content{padding:18px;line-height:1.9;font-size:16px;direction:ltr;text-align:left;color:#1f2937}.passage-content p{margin:0 0 12px}.passage-content img{max-width:100%;height:auto;border-radius:14px;border:1px solid var(--border);display:block;margin:12px auto}.passage-content table{width:100%;border-collapse:collapse;margin:12px 0}.passage-content td,.passage-content th{border:1px solid var(--border);padding:8px;text-align:center}.passage-tabs{display:flex;gap:8px;overflow:auto;padding:8px 2px 14px}.tab{white-space:nowrap;border:1.5px solid var(--border);background:#fff;border-radius:999px;padding:9px 13px;font-size:12px;font-weight:900;color:var(--navy);cursor:pointer}.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.option{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:13px 14px;cursor:pointer;transition:.15s;direction:ltr;text-align:left}.option:hover{border-color:var(--navy);box-shadow:0 8px 22px rgba(15,35,55,.07)}.option.selected{border-color:var(--blue);background:#eff6ff}.option.correct{border-color:var(--green);background:#f0fdf4}.option.wrong{border-color:var(--red);background:#fef2f2}.badge{width:30px;height:30px;border-radius:50%;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:950;flex-shrink:0}.q-title{font-size:18px;font-weight:900;color:var(--navy);line-height:1.65;direction:ltr;text-align:left}.muted{color:var(--muted)}
@media(max-width:860px){.h-inner{align-items:flex-start}.b-title{font-size:15px}.hero h1{font-size:23px}.wrap{padding:16px 12px 90px}.top-actions .pill{font-size:11px;padding:8px 10px}.passage-content{font-size:15px}.stats{width:100%}.stat{flex:1;min-width:95px}}

.study-grid{display:grid;gap:18px}.index-card,.words-card,.q-study{background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:0 10px 26px rgba(15,35,55,.06);padding:18px}.index-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.section-title{font-size:20px;color:var(--navy);font-weight:950;margin-bottom:10px}.q-study{margin-top:12px}.q-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}.q-num{background:var(--navy);color:var(--gold);border-radius:12px;padding:8px 11px;font-weight:950;direction:ltr}.q-text{font-size:17px;font-weight:900;color:var(--navy);line-height:1.7;direction:ltr;text-align:left}.option-wrap{display:grid;gap:8px;margin:12px 0}.explain{background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:14px;margin-top:10px;line-height:1.85}.explain:empty::before{content:'لا يوجد شرح محفوظ لهذا السؤال في Firebase.';color:var(--muted);font-weight:800}.words-table{width:100%;border-collapse:collapse;direction:ltr;text-align:center;min-width:540px}.words-table th{background:var(--navy);color:#fff;padding:10px}.words-table td{border:1px solid var(--border);padding:9px;font-weight:800}.scroll{overflow:auto}.passage-block{scroll-margin-top:92px}.correct-label{display:inline-flex;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;margin-top:8px}
</style>
</head>
<body>
<header class="header"><div class="h-inner"><a class="brand" href="reading.html"><div class="logo">WE<br>CAN</div><div><div class="b-title">WE CAN <span>STEP</span></div><div class="b-sub">منصة وي كان ستيب</div></div></a><div class="top-actions"><a class="pill" href="reading.html">↩️ Reading</a><a class="pill gold" href="reading-model-41.html">📝 اختبار النموذج</a></div></div></header>
<main class="wrap">
<section class="hero"><div><h1>Reading Model 41 — Study Mode</h1><p>صفحة مذاكرة ديناميكية تقرأ القطع والأسئلة والشروحات من Firebase.</p></div><div class="stats"><div class="stat"><b id="passageCount">-</b><span>قطع</span></div><div class="stat"><b id="questionCount">-</b><span>أسئلة</span></div><div class="stat"><b id="wordCount">-</b><span>كلمات</span></div></div></section>
<div id="app"><div class="loading"><div class="spin"></div><h2>جاري تحميل Study Mode من Firebase...</h2><p class="muted">quiz_models / reading-41</p></div></div>
</main>
<script type="module">
import { db, doc, getDoc } from './firebase-wecan.js';
const MODEL_ID='reading-41'; let model=null; const letters=['A','B','C','D'];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function getOpts(q){return q.options||q.opts||[]}
function getCorrect(q){let c=q.correct; if(c===undefined)c=q.ans; if(typeof c==='string'){let u=c.trim().toUpperCase(); if(letters.includes(u))return letters.indexOf(u); let n=parseInt(u,10); return Number.isFinite(n)?n:0} return Number.isInteger(c)?c:0}
function passageBody(p){let v=p.html||p.text||p.passage||p.content||p.body||''; if(Array.isArray(p.paragraphs))v=p.paragraphs.join('\n\n'); if(Array.isArray(p.paras))v=p.paras.join('\n\n'); if(/<\w+[^>]*>/.test(String(v))) return String(v); return String(v).split(/\n\s*\n+/).filter(Boolean).map((x,i)=>`<p>${esc(x)}</p>`).join('')}
function expHtml(q){let e=q.explanation||q.exp||q.explain||''; if(!e)return ''; if(/<\w+[^>]*>/.test(String(e)))return String(e); return String(e).split(/\n+/).filter(Boolean).map(x=>`<div style="background:#fff;border:1px solid #e2e8f0;border-right:5px solid var(--gold2);border-radius:12px;padding:9px 12px;margin:8px 0;font-weight:750">${esc(x)}</div>`).join('')}
function wordsBlock(){const words=model.importantWords||[]; if(!words.length)return ''; return `<details class="words-card" open><summary class="section-title" style="cursor:pointer">📘 (${words.length}) كلمات مهمة في هذا النموذج</summary><p class="muted" style="margin-bottom:12px">لو حفظتها بتضمن درجات أكثر في هذا النموذج.</p><div class="scroll"><table class="words-table"><thead><tr><th>The word</th><th>Closest in meaning to</th><th>The meaning</th></tr></thead><tbody>${words.map(w=>`<tr><td>${esc(w.word||w.theWord||'')}</td><td>${esc(w.closest||w.closestInMeaningTo||'')}</td><td style="direction:rtl;color:#7c2d12">${esc(w.meaning||w.arabic||'')}</td></tr>`).join('')}</tbody></table></div></details>`}
function questionBlock(q, globalNum){const opts=getOpts(q), c=getCorrect(q); return `<div class="q-study"><div class="q-head"><div class="q-num">${q.original||q.number||globalNum}</div><div class="q-text">${esc(q.question||q.q||'')}</div></div><div class="option-wrap">${opts.map((o,i)=>`<div class="option ${i===c?'correct':''}"><span class="badge">${letters[i]}</span><div>${esc(o)}</div></div>`).join('')}</div><div class="correct-label">✅ الإجابة الصحيحة: ${letters[c]} — ${esc(opts[c]||'')}</div><div class="explain">${expHtml(q)}</div></div>`}
function render(){let total=(model.passages||[]).reduce((a,p)=>a+(p.questions||[]).length,0), n=0; document.getElementById('passageCount').textContent=model.passages.length; document.getElementById('questionCount').textContent=total; document.getElementById('wordCount').textContent=(model.importantWords||[]).length; document.getElementById('app').innerHTML=`<div class="study-grid"><div class="index-card"><div class="section-title">اختر القطعة للمذاكرة 👇</div><div class="index-list">${model.passages.map((p,i)=>`<a class="btn btn-ghost small" href="#p${i}">${esc(p.emoji||'📖')} ${esc(p.title||('Passage '+(i+1)))}</a>`).join('')}</div></div>${wordsBlock()}${model.passages.map((p,pi)=>`<section class="passage-block" id="p${pi}"><div class="passage-box"><div class="passage-title"><span>${esc(p.emoji||'📖')} ${esc(p.title||('Passage '+(pi+1)))}</span><span>${(p.questions||[]).length} سؤال</span></div><div class="passage-content">${passageBody(p)}</div></div>${(p.questions||[]).map(q=>questionBlock(q,++n)).join('')}</section>`).join('')}</div>`}
async function loadModel(){try{const snap=await getDoc(doc(db,'quiz_models',MODEL_ID)); if(!snap.exists()) throw new Error('لم يتم العثور على reading-41 في Firebase'); model=snap.data(); if(!model.passages||!model.passages.length) throw new Error('النموذج موجود لكن لا يحتوي على passages'); render();}catch(e){document.getElementById('app').innerHTML=`<div class="error"><h2>تعذر تحميل صفحة المذاكرة</h2><p>${esc(e.message)}<br>تأكد أنك نشرت Reading Model 41 من لوحة التحكم.</p><br><a class="btn btn-navy" href="reading.html">الرجوع إلى Reading</a></div>`}}
loadModel();
</script>
</body>
</html>
