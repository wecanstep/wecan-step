<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Model 41 — WE CAN STEP</title>
<style>
:root{--navy:#173244;--navy2:#0b2035;--gold:#fbbf24;--gold2:#f59e0b;--bg:#eef2f7;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#dbe3ee;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--teal:#0f766e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}.ltr{direction:ltr;text-align:left}.rtl{direction:rtl;text-align:right}
.header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff;border-bottom:1px solid rgba(251,191,36,.24);box-shadow:0 10px 30px rgba(15,35,55,.18)}
.h-inner{max-width:1220px;margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;align-items:center;gap:12px;direction:ltr}.logo{width:46px;height:46px;border-radius:14px;background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:950;line-height:1.05;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.22);font-size:12px}.b-title{font-size:18px;font-weight:950;letter-spacing:2px}.b-title span{color:var(--gold)}.b-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;letter-spacing:0}.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-weight:850;font-size:12px;color:#fff}.pill.gold{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.3);color:#fde68a}
.btn{border:0;border-radius:14px;padding:11px 16px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:.18s}.btn:hover{transform:translateY(-1px);filter:brightness(1.02)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}.btn-navy{background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff}.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy2)}.btn-teal{background:linear-gradient(135deg,#0f766e,#14b8a6);color:#fff}.btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--border)}.btn-red{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.small{font-size:12px;padding:8px 12px;border-radius:11px}
.wrap{max-width:1220px;margin:auto;padding:22px 18px 90px}.hero{background:#fff;border:1px solid var(--border);border-radius:26px;padding:24px;box-shadow:0 12px 34px rgba(15,35,55,.08);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.hero h1{font-size:28px;color:var(--navy);font-weight:950;direction:ltr}.hero p{color:var(--muted);font-size:14px;margin-top:6px}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:#f8fafc;border:1px solid var(--border);border-radius:18px;padding:13px 16px;min-width:100px;text-align:center}.stat b{display:block;color:var(--navy);font-size:22px}.stat span{font-size:12px;color:var(--muted);font-weight:800}
.loading,.error{background:#fff;border:1px solid var(--border);border-radius:24px;padding:38px 22px;text-align:center;box-shadow:0 12px 34px rgba(15,35,55,.08)}.loading .spin{width:42px;height:42px;border-radius:50%;border:4px solid #e5e7eb;border-top-color:var(--gold2);margin:0 auto 14px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.error h2{color:var(--red);font-size:22px;margin-bottom:10px}.error p{color:var(--muted);line-height:1.8}
.passage-box{background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:0 10px 26px rgba(15,35,55,.06);overflow:hidden}.passage-title{background:linear-gradient(135deg,#0f766e,#16a34a);color:#fff;padding:15px 18px;font-weight:950;display:flex;align-items:center;justify-content:space-between;gap:12px}.passage-content{padding:18px;line-height:1.9;font-size:16px;direction:ltr;text-align:left;color:#1f2937}.passage-content p{margin:0 0 12px}.passage-content img{max-width:100%;height:auto;border-radius:14px;border:1px solid var(--border);display:block;margin:12px auto}.passage-content table{width:100%;border-collapse:collapse;margin:12px 0}.passage-content td,.passage-content th{border:1px solid var(--border);padding:8px;text-align:center}.passage-tabs{display:flex;gap:8px;overflow:auto;padding:8px 2px 14px}.tab{white-space:nowrap;border:1.5px solid var(--border);background:#fff;border-radius:999px;padding:9px 13px;font-size:12px;font-weight:900;color:var(--navy);cursor:pointer}.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.option{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:13px 14px;cursor:pointer;transition:.15s;direction:ltr;text-align:left}.option:hover{border-color:var(--navy);box-shadow:0 8px 22px rgba(15,35,55,.07)}.option.selected{border-color:var(--blue);background:#eff6ff}.option.correct{border-color:var(--green);background:#f0fdf4}.option.wrong{border-color:var(--red);background:#fef2f2}.badge{width:30px;height:30px;border-radius:50%;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:950;flex-shrink:0}.q-title{font-size:18px;font-weight:900;color:var(--navy);line-height:1.65;direction:ltr;text-align:left}.muted{color:var(--muted)}
@media(max-width:860px){.h-inner{align-items:flex-start}.b-title{font-size:15px}.hero h1{font-size:23px}.wrap{padding:16px 12px 90px}.top-actions .pill{font-size:11px;padding:8px 10px}.passage-content{font-size:15px}.stats{width:100%}.stat{flex:1;min-width:95px}}

.exam-grid{display:grid;grid-template-columns:minmax(0,1.04fr) minmax(360px,.96fr);gap:18px;align-items:start}.left-sticky{position:sticky;top:92px}.q-card{background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:0 10px 26px rgba(15,35,55,.06);padding:18px}.q-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}.q-counter{background:#f8fafc;border:1px solid var(--border);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;color:var(--navy)}.opts{display:flex;flex-direction:column;gap:10px;margin-top:14px}.nav-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);z-index:60;padding:10px 14px}.nav-inner{max-width:1220px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}.progress{flex:1;height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold));transition:.2s}.qnav{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 0;direction:ltr}.qdot{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--navy);font-weight:900;cursor:pointer}.qdot.answered{background:#dcfce7;border-color:#86efac;color:#166534}.qdot.current{background:var(--navy);color:#fff;border-color:var(--navy)}.result-card{background:#fff;border:1px solid var(--border);border-radius:26px;padding:24px;box-shadow:0 12px 34px rgba(15,35,55,.08)}.review{margin-top:18px;display:grid;gap:12px}.review-item{border:1px solid var(--border);border-radius:16px;padding:14px;background:#f8fafc}.review-item.ok{border-color:#86efac;background:#f0fdf4}.review-item.bad{border-color:#fecaca;background:#fef2f2}@media(max-width:960px){.exam-grid{grid-template-columns:1fr}.left-sticky{position:static}.nav-inner{flex-wrap:wrap}.progress{order:-1;flex-basis:100%}}
</style>
</head>
<body>
<header class="header"><div class="h-inner"><a class="brand" href="reading.html"><div class="logo">WE<br>CAN</div><div><div class="b-title">WE CAN <span>STEP</span></div><div class="b-sub">منصة وي كان ستيب</div></div></a><div class="top-actions"><a class="pill" href="reading.html">↩️ Reading</a><a class="pill gold" href="reading-model-41-study.html">📚 مذاكرة النموذج</a><span class="pill" id="timer">60:00</span></div></div></header>
<main class="wrap">
<section class="hero"><div><h1>Reading Model 41</h1><p>اختبار قراءة ديناميكي يقرأ الأسئلة مباشرة من Firebase.</p></div><div class="stats"><div class="stat"><b id="passageCount">-</b><span>قطع</span></div><div class="stat"><b id="questionCount">-</b><span>أسئلة</span></div><div class="stat"><b>60</b><span>دقيقة</span></div></div></section>
<div id="app"><div class="loading"><div class="spin"></div><h2>جاري تحميل Reading Model 41 من Firebase...</h2><p class="muted">quiz_models / reading-41</p></div></div>
</main>
<div class="nav-bar" id="navBar" style="display:none"><div class="nav-inner"><button class="btn btn-ghost" id="prevBtn" onclick="prevQ()">السابق</button><div class="progress"><span id="progressFill"></span></div><button class="btn btn-navy" id="nextBtn" onclick="nextQ()">التالي</button><button class="btn btn-gold" onclick="submitExam()">إنهاء الاختبار</button></div></div>
<script type="module">
import { db, doc, getDoc } from './firebase-wecan.js';
const MODEL_ID='reading-41';
let model=null, flat=[], current=0, answers=[], seconds=3600, timerInt=null;
const letters=['A','B','C','D'];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function getOpts(q){return q.options||q.opts||[]}
function getCorrect(q){let c=q.correct; if(c===undefined)c=q.ans; if(typeof c==='string'){let u=c.trim().toUpperCase(); if(letters.includes(u))return letters.indexOf(u); let n=parseInt(u,10); return Number.isFinite(n)?n:0} return Number.isInteger(c)?c:0}
function passageBody(p){let v=p.html||p.text||p.passage||p.content||p.body||''; if(Array.isArray(p.paragraphs))v=p.paragraphs.join('\n\n'); if(Array.isArray(p.paras))v=p.paras.join('\n\n'); if(/<\w+[^>]*>/.test(String(v))) return String(v); return String(v).split(/\n\s*\n+/).filter(Boolean).map((x,i)=>`<p>${esc(x)}</p>`).join('')}
function flatten(){flat=[];(model.passages||[]).forEach((p,pi)=>(p.questions||[]).forEach((q,qi)=>flat.push({p,pi,q,qi})));answers=Array(flat.length).fill(null)}
async function loadModel(){try{const snap=await getDoc(doc(db,'quiz_models',MODEL_ID)); if(!snap.exists()) throw new Error('لم يتم العثور على reading-41 في Firebase'); model=snap.data(); if(!model.passages||!model.passages.length) throw new Error('النموذج موجود لكن لا يحتوي على passages'); flatten(); document.getElementById('passageCount').textContent=model.passages.length; document.getElementById('questionCount').textContent=flat.length; startExam();}catch(e){document.getElementById('app').innerHTML=`<div class="error"><h2>تعذر تحميل النموذج</h2><p>${esc(e.message)}<br>تأكد أنك نشرت Reading Model 41 من لوحة التحكم إلى Firebase.</p><br><a class="btn btn-navy" href="reading.html">الرجوع إلى Reading</a></div>`}}
function startExam(){document.getElementById('navBar').style.display='block'; render(); startTimer();}
function passageTabs(){return (model.passages||[]).map((p,i)=>`<button class="tab ${i===flat[current].pi?'on':''}" onclick="goPassage(${i})">${esc(p.emoji||'📖')} ${esc(p.title||('Passage '+(i+1)))}</button>`).join('')}
window.goPassage=function(pi){const idx=flat.findIndex(x=>x.pi===pi); if(idx>=0){current=idx;render();}}
function qDots(){return flat.map((_,i)=>`<button class="qdot ${answers[i]!==null?'answered':''} ${i===current?'current':''}" onclick="goQ(${i})">${i+1}</button>`).join('')}
window.goQ=function(i){current=i;render();}
function render(){const item=flat[current], p=item.p, q=item.q, opts=getOpts(q); document.getElementById('progressFill').style.width=((current+1)/flat.length*100)+'%'; document.getElementById('prevBtn').disabled=current===0; document.getElementById('nextBtn').textContent=current===flat.length-1?'الأخير':'التالي'; document.getElementById('app').innerHTML=`<div class="passage-tabs">${passageTabs()}</div><div class="exam-grid"><div class="left-sticky"><div class="passage-box"><div class="passage-title"><span>${esc(p.emoji||'📖')} ${esc(p.title||('Passage '+(item.pi+1)))}</span><span>قطعة ${item.pi+1} من ${model.passages.length}</span></div><div class="passage-content">${passageBody(p)}</div></div></div><div><div class="q-card"><div class="q-meta"><span class="q-counter">سؤال ${current+1} من ${flat.length}</span><span class="q-counter">${esc(q.original||q.number||'')}</span></div><div class="q-title">${esc(q.question||q.q||'')}</div><div class="opts">${opts.map((o,i)=>`<div class="option ${answers[current]===i?'selected':''}" onclick="pick(${i})"><span class="badge">${letters[i]}</span><div>${esc(o)}</div></div>`).join('')}</div><div class="qnav">${qDots()}</div></div></div></div>`; window.scrollTo({top:0,behavior:'smooth'});}
window.pick=function(i){answers[current]=i;render();}
window.prevQ=function(){if(current>0){current--;render();}}
window.nextQ=function(){if(current<flat.length-1){current++;render();}}
function startTimer(){if(timerInt)clearInterval(timerInt); timerInt=setInterval(()=>{seconds--; if(seconds<=0)submitExam(); const m=String(Math.floor(seconds/60)).padStart(2,'0'), s=String(seconds%60).padStart(2,'0'); document.getElementById('timer').textContent=m+':'+s;},1000)}
window.submitExam=function(){if(!confirm('هل تريد إنهاء الاختبار وعرض النتيجة؟'))return; clearInterval(timerInt); let score=0; flat.forEach((it,i)=>{if(answers[i]===getCorrect(it.q))score++;}); const pct=Math.round(score/flat.length*100); document.getElementById('navBar').style.display='none'; document.getElementById('app').innerHTML=`<div class="result-card"><h2 style="font-size:30px;color:var(--navy);margin-bottom:8px">نتيجتك في Reading Model 41</h2><p class="muted">تم تحميل النموذج من Firebase مباشرة.</p><div class="stats" style="margin-top:16px"><div class="stat"><b>${score}</b><span>صحيح</span></div><div class="stat"><b>${flat.length-score}</b><span>خطأ</span></div><div class="stat"><b>${pct}%</b><span>النسبة</span></div></div><div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap"><a class="btn btn-teal" href="reading-model-41-study.html">📚 ذاكر النموذج</a><button class="btn btn-navy" onclick="location.reload()">🔁 إعادة الاختبار</button><a class="btn btn-ghost" href="reading.html">Reading</a></div><div class="review">${flat.map((it,i)=>{const c=getCorrect(it.q), ok=answers[i]===c; return `<div class="review-item ${ok?'ok':'bad'}"><b>سؤال ${i+1}:</b> ${esc(it.q.question||it.q.q||'')}<br><span>إجابتك: ${answers[i]===null?'لم تجب':letters[answers[i]]} — الصحيح: ${letters[c]}</span></div>`}).join('')}</div></div>`; window.scrollTo(0,0);}
loadModel();
</script>
</body>
</html>
