<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grammar Model 06 — Admin Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top-bar{background:#1e293b;border-bottom:1px solid #334155;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:16px;font-weight:900;color:#fff}
.top-bar h1 span{color:#fbbf24}
.demo-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.top-actions{display:flex;gap:8px}
.btn{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-save{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.btn-reset{background:#334155;color:#94a3b8}
.btn-preview{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
.info-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:20px}
.info-card h2{font-size:14px;font-weight:900;color:#94a3b8;letter-spacing:.5px;margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-full{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:5px}
input,textarea,select{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;padding:9px 12px;font-size:13px;color:#e2e8f0;font-family:Arial,sans-serif;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2563eb}
textarea{resize:vertical;min-height:60px}
.q-list{display:flex;flex-direction:column;gap:12px}
.q-item{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.q-item-head{background:#0f172a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.q-num-badge{background:#2563eb;color:#fff;font-size:11px;font-weight:900;padding:3px 10px;border-radius:999px}
.q-item-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.opt-lbl{font-size:12px;font-weight:900;color:#64748b;flex-shrink:0;width:20px}
.correct-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f172a;border-radius:8px}
.correct-row label{margin:0;color:#94a3b8;font-size:12px}
select.correct-sel{width:auto;flex:1}
.toast{position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;font-size:14px;font-weight:800;padding:12px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(80px);opacity:0;transition:all .3s;z-index:100}
.toast.show{transform:translateY(0);opacity:1}
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:#94a3b8}
.stat strong{color:#fbbf24;display:block;font-size:20px;font-weight:900}
.modified-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%;display:inline-block;margin-left:6px}
@media(max-width:600px){.field-row,.opts-grid{grid-template-columns:1fr}.top-bar{flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Grammar Model 06 <span>— Admin Demo</span></h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="demo-badge">&#9881;&#65039; تجريبي فقط</span>
    <div class="top-actions">
      <button class="btn btn-reset" onclick="resetAll()">&#10227; استعادة الأصلي</button>
      <button class="btn btn-preview" onclick="openPreview()">&#128065; معاينة الكويز</button>
      <button class="btn btn-save" onclick="saveAll()">&#128190; حفظ التعديلات</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="stats-row">
    <div class="stat"><strong id="statQ">0</strong>سؤال</div>
    <div class="stat"><strong id="statMod" style="color:#f59e0b">0</strong>معدّل</div>
    <div class="stat"><strong id="statKey" style="color:#60a5fa;font-size:12px;font-weight:700" id="lsKey">—</strong>مفتاح localStorage</div>
  </div>

  <div class="info-card">
    <h2>&#9997;&#65039; معلومات الكويز</h2>
    <div class="field-row">
      <div>
        <label>عنوان الكويز (AR)</label>
        <input type="text" id="metaTitle" placeholder="مثال: Grammar Model 05">
      </div>
      <div>
        <label>اسم الدرس في quizResults</label>
        <input type="text" id="metaLesson" placeholder="مثال: Grammar Model 5">
      </div>
    </div>
  </div>

  <div class="info-card">
    <h2>&#128203; الأسئلة</h2>
    <div class="q-list" id="qList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = "wcs_quiz_gm06";
var QUIZ_FILE   = "grammar-model-06.html";

var originalData = {"title":"Grammar Model 06","lesson":"Grammar Model 6","questions":[{q:"61) Sara: Help! I lost my key and can't get into my house!<br>Mona: Don't worry, I…………. send my son to help you.",opts:["have","will","should","would"],ans:1,exp:"عند تقديم المساعدة نستخدم will."},
  {q:"62) If you want to become a doctor, you……… go to the college of medicine.",opts:["should","might","ought","would"],ans:0,exp:"want مضارع والحالة الأولى غير موجودة نختار بديل will وهو should."},
  {q:"63) Many students from different parts of the world attend my classes at the university; …...…..",opts:["some of them are Arabs but the rest are from the Far East","all of them are from Bahrain","some of them are Arabs but the rest are from Bahrain","all of them are from the Far East"],ans:0,exp:"من مختلف أنحاء العالم = بعضهم عرب والباقي من الشرق الأقصى."},
  {q:"64) Eric: Is this……………. car?<br>Matt: No, it's not. My car is over there.",opts:["my","mine","your","yours"],ans:2,exp:"بعد الفراغ كلمة car اسم مملوك فنستخدم your (صفة ملكية)."},
  {q:"65) Don't stop, Dave. Keep……………",opts:["to run","running","run","ran"],ans:1,exp:"Keep + V-ing = keep running."},
  {q:"66) The weather……………. warm these days.",opts:["gets","is getting","was getting","gotten"],ans:1,exp:"these days دلالة على مضارع مستمر = is getting."},
  {q:"67) I think I…………. take an English course next summer.",opts:["will","have","going to","might to"],ans:0,exp:"I think + will للتعبير عن قرار مستقبلي."},
  {q:"68) Which of the underlined words or phrases is INCORRECT?<br>My father <u>he</u> gave that watch <u>to me</u> when I <u>graduated</u> from <u>high school</u>.",opts:["he","to me","graduated","high school"],ans:0,exp:"he زائدة — My father هو الفاعل ولا نكرره بضمير."},
  {q:"69) By this time next week, I…………. on a beach in Malaysia.",opts:["relax","will relax","am relaxing","will be relaxing"],ans:3,exp:"By this time next week = Future Continuous = will be relaxing."},
  {q:"70) The weather…………. September was very warm this year.",opts:["in","with","at","to"],ans:0,exp:"in September = في سبتمبر (شهر)."},
  {q:"71) Nouf is having trouble with math at school, so she…………to find a tutor.",opts:["is try","trying","is trying","tries"],ans:2,exp:"السياق حالي مستمر + she = is trying."},
  {q:"72) Essam flew to Riyadh from Jeddah and then he…………….",opts:["a taxi to my house took to surprise me","to surprise me to my house took a taxi","took a taxi to surprise me to my house","took a taxi to my house to surprise me"],ans:3,exp:"الترتيب الصحيح: فعل + مفعول + infinitive of purpose."},
  {q:"73) My friend was sick, so I had to go to the party………….",opts:["with myself","by myself","for myself","to myself"],ans:1,exp:"by myself = بمفردي."},
  {q:"74) The doctor introduced…………….to us.",opts:["ourselves","yourself","himself","itself"],ans:2,exp:"The doctor (مذكر) = introduced himself."},
  {q:"75) The football game started at 8 o' clock…….",opts:["and we arrived just in time for the second half","and we for the second half just arrived in time","and just in time we arrived for the second half","and just for the second half in time we arrived"],ans:0,exp:"الترتيب الصحيح: Subject + Verb + adverb phrase."},
  {q:"76) Which one of the underlined words or phrases is INCORRECT?<br>Today we are going to review some of the chapters we <u>discuss</u> in our <u>last</u> <u>lecture</u>.",opts:["Today","to review","discuss","last"],ans:2,exp:"discuss يجب أن تكون discussed (ماضي بسيط — last lecture)."},
  {q:"77) In which sentence is all CAPITALIZATION correct?",opts:["he arrived on Monday, September 3.","He arrived on Monday, september 3.","He arrived on monday, September 3.","He arrived on Monday, September 3."],ans:3,exp:"أسماء الأيام والأشهر تبدأ بحرف كبير دائماً."},
  {q:"78) Which phrase correctly replaces the INCORRECT underlined phrase?<br><u>Walk along the road</u>. I saw something strange in the nearby forest.",opts:["Walking along the road","Walks along the road","Along the road walk","The road along"],ans:0,exp:"Walking along the road = Participle phrase صحيحة."},
  {q:"79) To which sentence can we add the following clause?<br>___________________ until it boils.<br>(1) Making a cup of tea is easy.<br>(2) First, you heat the water.<br>(3) Then, pour it into a cup with a teabag and wait a couple of minutes.<br>(4) Now, you can remove the teabag and drink it.",opts:["(1)","(2)","(3)","(4)"],ans:1,exp:"تسخين الماء حتى يغلي = الجملة (2)."},
  {q:"80) Jack was preparing the hamburgers…..…. John was lighting the barbeque fire.",opts:["while","until","so that","even if"],ans:0,exp:"حدثان يحدثان في نفس الوقت = while."},
  {q:"81) The soldiers returned from the war………they had fought bravely for many months.",opts:["before","after","until","unless"],ans:1,exp:"had fought = Past Perfect = after."},
  {q:"82) I think I took your book yesterday, and you took………………..",opts:["me","myself","my","mine"],ans:3,exp:"يأتي بعد took مفعول به = mine (ضمير ملكية مستقل)."},
  {q:"83) Please do not touch………… that I put on the table as I want to take it to my class party.",opts:["cake","a cake","all cake","the cake"],ans:3,exp:"the cake = الكعكة المحددة التي وضعتها على الطاولة."},
  {q:"84) Which of the underlined words or phrases is INCORRECT?<br>I often help my mother. When she's busy, I <u>look after</u> my younger brother and make sure he <u>doesn't</u> get into trouble. I think all <u>childs</u> should help <u>their</u> parents.",opts:["look after","doesn't","childs","their"],ans:2,exp:"childs خطأ — الجمع الصحيح هو children."},
  {q:"85) I want…………………. to the store because I need some food.",opts:["to go","going","to going","that I go"],ans:0,exp:"want + to + infinitive = want to go."},
  {q:"86) In which sentence is all CAPITALIZATION correct?",opts:["Although Chinese, Korean, Japanese and other east asians are very distinct, many people seem unable to tell them apart.","Although Chinese, Korean, Japanese and other east Asians are very distinct, many people seem unable to tell them apart.","Although Chinese, Korean, Japanese and other East Asians are very distinct, many people seem unable to tell them apart.","Although chinese, korean, japanese and other east asians are very distinct, many people seem unable to tell them apart."],ans:2,exp:"East Asians = اسم علم يبدأ بحرف كبير."},
  {q:"87) Go to the shop…………… is next to the pharmacy.",opts:["which","where","who","what"],ans:0,exp:"the shop = شيء جامد نستخدم which."},
  {q:"88) I have known Alex…………..ten years.",opts:["since","from","in","for"],ans:3,exp:"ten years = فترة زمنية = for."},
  {q:"89) An earthquake happened while I………. in my office.",opts:["work","worked","am working","was working"],ans:3,exp:"while + Past Continuous = was working."},
  {q:"90) I usually ………before bedtime.",opts:["reading","am reading","read","to read"],ans:2,exp:"usually = عادة = Present Simple = read."},
  {q:"91) My doctor told me that I should………. more vegetables.",opts:["eating","to eat","eat","ate"],ans:2,exp:"should + base verb = should eat."},
  {q:"92) Mona and I ………….. up at my house tomorrow.",opts:["will to meet","are going to meet","be meeting","meeting"],ans:1,exp:"خطة مستقبلية مرتبة = are going to meet."},
  {q:"93) I'm so…………… I'm going to Australia next week.",opts:["excite","excited","exciting","excitement"],ans:1,exp:"I'm so excited = متحمس (وصف للشخص نفسه = Past Participle)."},
  {q:"94) Bob enjoys……….. games on his PC.",opts:["play","to play","playing","will play"],ans:2,exp:"enjoy + V-ing = enjoy playing."},
  {q:"95) Anna watched TV and then……… to a friend on Skype.",opts:["speak","speaking","spoken","spoke"],ans:3,exp:"watched and then spoke = ماضي بسيط متسلسل."},
  {q:"96) Paul is a bad roommate. While I clean the apartment on the weekends, he just……. videogames.",opts:["is playing","playing","is plays","plays"],ans:3,exp:"عادة متكررة في الحاضر = Present Simple = plays."},
  {q:"97) His breathing problems………….by smoking.",opts:["caused","were caused","are causing","causing"],ans:1,exp:"مشاكل تنفسه سُببت بالتدخين = Passive Past = were caused."},
  {q:"98) Alex………. in the face by his little brother.",opts:["kicked","had kicked","was kicking","was kicked"],ans:3,exp:"ضُرب على وجهه = Passive = was kicked."},
  {q:"99) My friend got a good job after……… from university last year.",opts:["graduates","graduating","to graduate","has graduated"],ans:1,exp:"after + V-ing = after graduating."},
  {q:"100) If I……. a bird, I would fly far away from this cold weather.",opts:["be","am","been","were"],ans:3,exp:"Second Conditional = If I were... (unreal condition)."}
]};

function loadData() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(originalData));
}

function buildUI() {
  var data = loadData();
  document.getElementById("metaTitle").value  = data.title  || "";
  document.getElementById("metaLesson").value = data.lesson || "";
  document.getElementById("statQ").textContent   = data.questions.length;
  document.getElementById("statKey").textContent = STORAGE_KEY;

  var list = document.getElementById("qList");
  list.innerHTML = "";

  data.questions.forEach(function(q, i) {
    var item = document.createElement("div");
    item.className = "q-item";
    item.id = "qi-" + i;

    var labels = ["A","B","C","D"];
    var optsHtml = "";
    (q.opts || []).forEach(function(opt, oi) {
      optsHtml += '<div class="opt-row"><span class="opt-lbl">' + labels[oi] + '</span><input type="text" id="opt-' + i + '-' + oi + '" value="' + esc(opt) + '" onchange="markModified(' + i + ')"></div>';
    });

    var correctOpts = "";
    (q.opts || []).forEach(function(_, oi) {
      correctOpts += '<option value="' + oi + '"' + (q.ans === oi ? " selected" : "") + '>' + labels[oi] + '</option>';
    });

    item.innerHTML =
      '<div class="q-item-head">' +
        '<span class="q-num-badge">Q' + (i+1) + '</span>' +
        '<span id="mod-' + i + '" style="display:none" class="modified-dot" title="معدّل"></span>' +
      '</div>' +
      '<div class="q-item-body">' +
        '<div class="field-full"><label>نص السؤال</label><textarea id="qt-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.q) + '</textarea></div>' +
        '<div class="opts-grid">' + optsHtml + '</div>' +
        '<div class="correct-row"><label>الإجابة الصحيحة:</label><select class="correct-sel" id="ans-' + i + '" onchange="markModified(' + i + ')">' + correctOpts + '</select></div>' +
        '<div class="field-full"><label>الشرح</label><textarea id="exp-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.exp || "") + '</textarea></div>' +
      '</div>';

    list.appendChild(item);
  });
  updateModCount();
}

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");\n}\n\nvar modifiedSet = {};\nfunction markModified(i) {\n  modifiedSet[i] = true;\n  document.getElementById("mod-" + i).style.display = "inline-block";\n  updateModCount();\n}\nfunction updateModCount() {\n  document.getElementById("statMod").textContent = Object.keys(modifiedSet).length;\n}\n\nfunction collectData() {\n  var data = loadData();\n  data.title  = document.getElementById("metaTitle").value.trim();\n  data.lesson = document.getElementById("metaLesson").value.trim();\n  data.questions.forEach(function(q, i) {\n    q.q   = document.getElementById("qt-" + i).value.trim();\n    q.ans = parseInt(document.getElementById("ans-" + i).value);\n    q.exp = document.getElementById("exp-" + i).value.trim();\n    (q.opts || []).forEach(function(_, oi) {\n      q.opts[oi] = document.getElementById("opt-" + i + "-" + oi).value.trim();\n    });\n  });\n  return data;\n}\n\nfunction saveAll() {\n  var data = collectData();\n  try {\n    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));\n    showToast("&#128190; تم الحفظ في localStorage بنجاح!");\n    modifiedSet = {};\n    document.querySelectorAll(".modified-dot").forEach(function(d){ d.style.display = "none"; });\n    updateModCount();\n  } catch(e) {\n    showToast("&#10060; خطأ في الحفظ: " + e.message);\n  }\n}\n\nfunction resetAll() {\n  if (!confirm("هل تريد استعادة البيانات الأصلية؟ سيتم حذف جميع التعديلات.")) return;\n  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}\n  modifiedSet = {};\n  buildUI();\n  showToast("&#10227; تم استعادة البيانات الأصلية");\n}\n\nfunction openPreview() {\n  saveAll();\n  window.open(QUIZ_FILE, "_blank");\n}\n\nfunction showToast(msg) {\n  var t = document.getElementById("toast");\n  t.innerHTML = msg;\n  t.classList.add("show");\n  setTimeout(function(){ t.classList.remove("show"); }, 2800);\n}\n\nbuildUI();\n</script>
</body>
</html>
