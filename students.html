<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جاري التحويل — منصة وي كان ستيب</title>
<style>
:root{--navy:#173244;--gold:#fbbf24;--bg:#eef2f7;--muted:#64748b}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--navy);text-align:center;padding:24px}
.card{background:#fff;border:1px solid #dbe3ee;border-radius:28px;padding:34px 28px;box-shadow:0 20px 55px rgba(15,23,42,.10);max-width:460px;width:100%}.loader{width:46px;height:46px;border-radius:50%;border:5px solid #e2e8f0;border-top-color:var(--gold);margin:0 auto 18px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}h1{font-size:24px;margin:0 0 10px;font-weight:900}p{margin:0;color:var(--muted);line-height:1.8;font-weight:700}
</style>
</head>
<body>
<div class="card"><div class="loader"></div><h1>جاري تحويلك...</h1><p>يتم التحقق من حالة دخولك واشتراكك.</p></div>
<script type="module">
import { auth, db, doc, getDoc, onAuthStateChanged, ADMIN_EMAIL, emailKey } from "./firebase-wecan.js";

function isExpired(student){
  const exp = Number(student?.subscriptionExpiresAtMs || 0);
  return !!exp && exp < Date.now();
}

onAuthStateChanged(auth, async function(user){
  try {
    if (!user || !user.email) {
      window.location.replace("login.html");
      return;
    }

    const email = String(user.email).toLowerCase();
    if (email === ADMIN_EMAIL) {
      window.location.replace("admin.html");
      return;
    }

    const snap = await getDoc(doc(db, "students", emailKey(email)));
    const student = snap.exists() ? snap.data() : null;
    const active = !!(student && student.isSubscriber === true && !isExpired(student));

    if (active) {
      window.location.replace("dashboard.html");
    } else {
      window.location.replace("free-dashboard.html?subscription=expired");
    }
  } catch (_) {
    window.location.replace("login.html");
  }
});
</script>
</body>
</html>
