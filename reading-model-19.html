<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reading Model 19 — قريبًا | WE CAN STEP</title>
<style>
:root{--navy:#173244;--navy2:#0b2035;--gold:#fbbf24;--bg:#eef2f7;--text:#1e293b;--muted:#64748b;--border:#dbe3ee;--green:#16a34a}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(circle at top,#f8fafc 0,#eef2f7 48%,#e8edf4 100%);font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:var(--text);display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#0b2035 0%,#173244 100%);color:#fff;padding:18px 20px;border-bottom:1px solid rgba(251,191,36,.22);display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 10px 28px rgba(15,35,55,.20)}
.back{text-decoration:none;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(251,191,36,.35);border-radius:16px;padding:12px 18px;font-weight:900;white-space:nowrap}
.brand{display:flex;align-items:center;gap:14px;direction:ltr}
.logo-box{width:62px;height:62px;border-radius:50%;background:#fff;border:2px solid rgba(251,191,36,.55);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.22);overflow:hidden}
.logo-box img{width:50px;height:50px;object-fit:contain}
.brand-title{font-size:26px;font-weight:950;letter-spacing:6px;color:#fff;text-align:left}
.brand-title::before{content:'· ';color:var(--gold)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:70px 22px}
.card{width:min(620px,100%);background:#fff;border-radius:34px;border:1px solid var(--border);box-shadow:0 28px 70px rgba(15,35,55,.14);padding:56px 28px;text-align:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;background:linear-gradient(90deg,#16a34a,#2563eb,#fbbf24)}
.icon{width:92px;height:92px;border-radius:26px;background:#fff8e6;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 12px 35px rgba(15,35,55,.12)}
.pill{display:inline-flex;align-items:center;gap:8px;background:#ecfdf5;border:1px solid #bbf7d0;color:#15803d;border-radius:999px;padding:10px 24px;font-size:18px;font-weight:950;margin-bottom:26px}
h1{font-size:42px;line-height:1.15;color:#173244;margin-bottom:22px;font-weight:950;direction:ltr}
.soon{display:inline-flex;align-items:center;justify-content:center;min-width:200px;height:82px;border-radius:24px;background:linear-gradient(135deg,#173244,#0b2035);color:#fbbf24;font-size:28px;font-weight:950;box-shadow:0 18px 36px rgba(23,50,68,.24);margin-bottom:28px}
p{font-size:22px;line-height:1.85;color:var(--muted);margin:0 auto 32px;max-width:520px}
p strong{color:#173244}
.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#102033;border-radius:22px;min-height:70px;padding:0 34px;font-size:20px;font-weight:950;box-shadow:0 15px 34px rgba(251,191,36,.25)}
.footer{text-align:center;padding:30px 16px;border-top:1px solid #dbe3ee;color:#64748b;font-weight:800;font-size:17px}
@media(max-width:640px){.header{padding:16px 14px}.brand-title{font-size:24px;letter-spacing:5px}.logo-box{width:58px;height:58px}.back{padding:10px 14px}.main{padding:58px 18px}.card{border-radius:30px;padding:50px 20px}h1{font-size:34px}p{font-size:20px}.soon{height:78px;font-size:26px}}
</style>
<style id="wcs-reading-desktop-readable">

  .passage-panel{top:96px !important;max-height:calc(100vh - 108px) !important;}
  .pp-head,.pc-head{padding:16px 22px !important;}
  .pp-head h2,.pc-head h2,.passage-title{font-size:18px !important;line-height:1.45 !important;}
  .pp-text,.pc-text,.passage-text{font-size:17px !important;line-height:2.05 !important;font-weight:520 !important;color:#0f172a !important;}
  .pp-text{padding:23px 24px !important;}

  .questions-panel{gap:18px !important;}
  .q-block,.question-card,.passage-card{border-radius:18px !important;}
  .q-block-head{padding:16px 20px !important;gap:12px !important;}
  .q-text,.question-title{font-size:17px !important;line-height:1.72 !important;font-weight:850 !important;}
  .q-num{font-size:14px !important;padding:6px 11px !important;}
  .q-opts{padding:16px 18px 18px !important;gap:10px !important;}
  .option,.opt,.answer-option{padding:13px 16px !important;border-radius:13px !important;gap:13px !important;font-size:16px !important;line-height:1.65 !important;font-weight:750 !important;}
  .opt-label,.option-letter,.opt-letter{width:33px !important;height:33px !important;font-size:14px !important;border-radius:9px !important;}
  .opt-text{font-size:16px !important;line-height:1.65 !important;font-weight:750 !important;}

  .results-body{padding-top:30px !important;}
  .res-container{max-width:1180px !important;padding-left:34px !important;padding-right:34px !important;}
  .review-item{scroll-margin-top:92px !important;}
  .rev-q-text{font-size:17px !important;line-height:1.75 !important;}
  .rev-ans-text{font-size:16px !important;line-height:1.65 !important;}
  .rev-exp{padding:24px 32px !important;}
  .rev-exp-pro,.exp-pro{gap:16px !important;line-height:2 !important;font-family:Tahoma, Arial, 'Segoe UI', system-ui, sans-serif !important;}
  .exp-title{font-size:23px !important;line-height:1.5 !important;}
  .exp-label,.exp-pro .exp-heading{font-size:15.5px !important;padding:8px 16px !important;line-height:1.45 !important;}
  .exp-value,.exp-pro .exp-text{font-size:17.5px !important;line-height:2 !important;font-weight:700 !important;}
  .exp-correct-box,.exp-pro .answer-box,.exp-pro .evidence-box{font-size:17px !important;line-height:1.95 !important;padding:14px 18px !important;border-radius:14px !important;}
  .answer-meaning-box{max-width:920px !important;font-size:18px !important;line-height:2 !important;padding:16px 20px !important;}
  .evidence-heading{font-size:20px !important;padding:9px 18px !important;}
  .match-box,.exp-pro .match-box{max-width:920px !important;font-size:17px !important;line-height:1.95 !important;padding:14px 18px !important;}
  .wrong-options-box.wrong-options-full{max-width:1080px !important;padding:16px !important;display:grid !important;grid-template-columns:repeat(auto-fit,minmax(310px,1fr)) !important;gap:14px !important;}
  .wrong-option-card{padding:15px 17px !important;}
  .wrong-option-choice{font-size:17px !important;line-height:1.7 !important;}
  .wrong-option-reason{font-size:16px !important;line-height:1.9 !important;}
}
