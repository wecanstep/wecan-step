<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="robots" content="noindex, nofollow">
<style id="wcs-auth-hide">body{visibility:hidden!important}</style>
<script type="module" src="./subscription-guard.js"></script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grammar Model 05 — Admin Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top-bar{background:#1e293b;border-bottom:1px solid #334155;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:16px;font-weight:900;color:#fff}
.top-bar h1 span{color:#fbbf24}
.demo-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.top-actions{display:flex;gap:8px}
.btn{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-save{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.btn-reset{background:#334155;color:#94a3b8}
.btn-preview{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
.info-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:20px}
.info-card h2{font-size:14px;font-weight:900;color:#94a3b8;letter-spacing:.5px;margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-full{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:5px}
input,textarea,select{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;padding:9px 12px;font-size:13px;color:#e2e8f0;font-family:Arial,sans-serif;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2563eb}
textarea{resize:vertical;min-height:60px}
.q-list{display:flex;flex-direction:column;gap:12px}
.q-item{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.q-item-head{background:#0f172a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.q-num-badge{background:#2563eb;color:#fff;font-size:11px;font-weight:900;padding:3px 10px;border-radius:999px}
.q-item-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.opt-lbl{font-size:12px;font-weight:900;color:#64748b;flex-shrink:0;width:20px}
.correct-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f172a;border-radius:8px}
.correct-row label{margin:0;color:#94a3b8;font-size:12px}
select.correct-sel{width:auto;flex:1}
.toast{position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;font-size:14px;font-weight:800;padding:12px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(80px);opacity:0;transition:all .3s;z-index:100}
.toast.show{transform:translateY(0);opacity:1}
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:#94a3b8}
.stat strong{color:#fbbf24;display:block;font-size:20px;font-weight:900}
.modified-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%;display:inline-block;margin-left:6px}
@media(max-width:600px){.field-row,.opts-grid{grid-template-columns:1fr}.top-bar{flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Grammar Model 05 <span>— Admin Demo</span></h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="demo-badge">&#9881;&#65039; تجريبي فقط</span>
    <div class="top-actions">
      <button class="btn btn-reset" onclick="resetAll()">&#10227; استعادة الأصلي</button>
      <button class="btn btn-preview" onclick="openPreview()">&#128065; معاينة الكويز</button>
      <button class="btn btn-save" onclick="saveAll()">&#128190; حفظ التعديلات</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="stats-row">
    <div class="stat"><strong id="statQ">0</strong>سؤال</div>
    <div class="stat"><strong id="statMod" style="color:#f59e0b">0</strong>معدّل</div>
    <div class="stat"><strong id="statKey" style="color:#60a5fa;font-size:12px;font-weight:700" id="lsKey">—</strong>مفتاح localStorage</div>
  </div>

  <div class="info-card">
    <h2>&#9997;&#65039; معلومات الكويز</h2>
    <div class="field-row">
      <div>
        <label>عنوان الكويز (AR)</label>
        <input type="text" id="metaTitle" placeholder="مثال: Grammar Model 05">
      </div>
      <div>
        <label>اسم الدرس في quizResults</label>
        <input type="text" id="metaLesson" placeholder="مثال: Grammar Model 5">
      </div>
    </div>
  </div>

  <div class="info-card">
    <h2>&#128203; الأسئلة</h2>
    <div class="q-list" id="qList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = "wcs_quiz_gm05";
var QUIZ_FILE   = "grammar-model-05-full.html";

var originalData = {"title":"Grammar Model 05","lesson":"Grammar Model 5","questions":[{q:"61) Which sentence has the CORRECT WORD ORDER?",opts:["To push each other around, the children like, on the chairs until one of them falls and start to cry.","On the chairs until one of them falls, the children like to push each other around, and start to cry.","The children like to push each other around on the chairs until one of them falls and starts to cry.","One of them falls and starts to cry until the children like to push each other around on the chairs"],ans:2,exp:"الترتيب الصحيح: Subject + Verb + Object + Adverb + until clause."},
  {q:"62) We.......... football three days ago.",opts:["play","played","have played","had play"],ans:1,exp:"three days ago = ماضي محدد = Past Simple = played."},
  {q:"63) Adam lives........ New York. He is a student........ New York University.",opts:["on / at","in / at","in / on","at / in"],ans:1,exp:"lives in (مدينة) + student at (مؤسسة)."},
  {q:"64) Lucy could have gone to London with her family..................",opts:["but she didn't","so, she didn't","and she did","but she did"],ans:0,exp:"could have gone = كان بإمكانها الذهاب، لكن في هذا السياق لم تذهب. الإجابة: but she didn't."},
  {q:"65) Anna's family is very worried about her ............... she hasn't called them since she left to study abroad.",opts:["she","because","unless","until"],ans:1,exp:"سبب القلق = because."},
  {q:"66) Choose the CORRECT ORDER to make the following sentences into a paragraph:<br>1) She practiced with the flash cards until she memorized the entire Arabic alphabet.<br>2) Eventually, with lots of practice she was able to converse quite well with her Arab friends.<br>3) Then she bought children's books to read until she built up her vocabulary and learned basic sentence structures.<br>4) Sara wanted to learn Arabic.<br>5) To start, she made a flash card for each letter with an English transliteration written on the back.",opts:["(4), (5), (2), (1), (3)","(5), (4), (3), (2), (1)","(4), (5), (1), (3), (2)","(5), (4), (1), (2), (3)"],ans:2,exp:"البداية بالفكرة الرئيسية (4) ثم الخطوات بالترتيب المنطقي."},
  {q:"67) .................... you play many sports?",opts:["Are","Have","Had","Do"],ans:3,exp:"Present Simple question = Do you play..."},
  {q:"68) In which sentence is all CAPITALIZATION correct?",opts:["My School Year begins on Saturday in late August.","My School year begins on Saturday in late august.","My school year begins on Saturday in late august.","My school year begins on Saturday in late August."],ans:3,exp:"August اسم شهر يبدأ بحرف كبير. school year كلمات عادية بحروف صغيرة."},
  {q:"69) The man had .......... for the furniture in full, but when it was delivered some items were missing.",opts:["pay","Paying","paid","pays"],ans:2,exp:"had + Past Participle = had paid."},
  {q:"70) If I have snacks, I always .......... them with my friends.",opts:["share","shared","had shared","am going to share"],ans:0,exp:"First Conditional / Present habit = always + Present Simple = share."},
  {q:"71) At the moment .......... anything, let's go to the coffeehouse.",opts:["do not do","did not do","am not doing","have not done"],ans:2,exp:"at the moment = الآن = Present Continuous negative = am not doing."},
  {q:"72) The second exam was .......... than the first one.",opts:["easy","easier","easiest","easily"],ans:1,exp:"مقارنة بين شيئين = Comparative = easier."},
  {q:"73) John's teacher told him that he .......... an excellent presentation yesterday.",opts:["give","gives","giving","gave"],ans:3,exp:"yesterday = ماضي بسيط = gave."},
  {q:"74) When Lisa .......... a child, she learned to read Arabic.",opts:["has been","had been","is","was"],ans:3,exp:"كانت طفلة في الماضي = was."},
  {q:"75) I need to conduct some research for my marketing course. .......... author's books would you recommend?",opts:["Who","Whom","Which","Whose"],ans:2,exp:"الصحيح Which author's books = كتب أي مؤلف؟ أما Whose author's books فتركيب غير صحيح هنا."},
  {q:"76) Although some of the students disagreed with the instructor, they respected .......... he said.",opts:["which","what","that","it"],ans:1,exp:"what he said = ما قاله (what = the thing that)."},
  {q:"77) Excuse me, Paul. Could I borrow .......... money until next week?",opts:["a","few","a bit","some"],ans:3,exp:"money = uncountable = some money."},
  {q:"78) Dave always .......... the watch that was given to him by his father.",opts:["wears","will wear","was to wear","has been wearing"],ans:0,exp:"always + عادة = Present Simple = wears."},
  {q:"79) Which sentence has the CORRECT WORD ORDER?<br>Choices about a student who came late and forgot a pen...",opts:["The student came in late for the exam and also forgot to bring a pen, or else be marked absent, so the teacher gave him five minutes to go buy a pen and come back.","The student came in late for the exam and also forgot to bring a pen, so the teacher gave him five minutes to go buy a pen and come back, or else be marked absent.","The teacher gave him five minutes to go buy a pen and, so come back, or else be marked absent, the student came in late for the exam and also forgot to bring a pen.","The teacher gave him five minutes to go buy a pen and come back, so the student came in late for the exam and also forgot to bring a pen, or else be marked absent."],ans:1,exp:"السبب يأتي أولاً ثم النتيجة ثم الشرط."},
  {q:"80) Which sentence has the CORRECT WORD ORDER?",opts:["To talk to people who have traveled to many other countries I find it interesting.","I find it interesting to talk to people who have traveled to many other countries.","People who have traveled to many other countries I find it interesting to talk to.","Who have traveled to many other countries people, I find it interesting to talk to."],ans:1,exp:"Subject + Verb + Object + Infinitive phrase."},
  {q:"81) Which one of the underlined words or phrases is INCORRECT?<br>My brother <u>explained me</u> the difficult math problem <u>so</u> I was able to finish <u>my</u> homework <u>on time</u>.",opts:["explained me","so","my","on time"],ans:0,exp:"explained me خطأ — الصحيح: explained to me أو explained the problem to me."},
  {q:"82) Which one of the underlined words or phrases is INCORRECT?<br>One of the biggest <u>problems</u> in developed <u>countries</u> today <u>are</u> the <u>traffic</u>.",opts:["problems","countries","are","traffic"],ans:2,exp:"One of = مفرد = is وليس are."},
  {q:"83) To which sentence from the paragraph can we add the following clause?<br>…, so that he had plenty of time to get ready.",opts:["[1] Everyday, Ahmad woke up one hour before the school bus arrived.","[2] First, he spent about fifteen to twenty minutes to wash up and get dressed.","[3] Then, he spent about twenty minutes to pack breakfast, lunch, tea, and a snack.","[4] Before walking out of the door, Ahmad always checked his bag."],ans:0,exp:"الاستيقاظ مبكراً = لديه وقت كافٍ = so that he had plenty of time."},
  {q:"84) Which sentence has the CORRECT WORD ORDER?",opts:["Had a snack with a glass of water, the girls played outside all morning, and then took a nap.","The girls played outside all morning, and then took a nap, had a snack with a glass of water.","The girls played outside all morning, had a snack with a glass of water, and then took a nap.","Had a snack with a glass of water, and then took a nap, the girls played outside all morning."],ans:2,exp:"الترتيب الزمني المنطقي للأحداث."},
  {q:"85) In which sentence is all PUNCTUATION correct?",opts:["My favorite animals include cats goldfish birds and, horses.","My favorite animals include: cats goldfish, birds, and horses.","My favorite animals include, cats, goldfish, birds, and, horses.","My favorite animals include: cats, goldfish, birds, and horses."],ans:3,exp:"قائمة بعد colon تفصل بفاصلة بين كل عنصر."},
  {q:"86) Roger: Do you travel a lot?<br>Steve: Oh yes. I spend eight or nine weeks travelling every year.<br>Roger: So, how many countries ............ so far?",opts:["have you been visiting","have you visited","do you visit","you visit"],ans:1,exp:"so far = حتى الآن = Present Perfect = have you visited."},
  {q:"87) The city has really changed over the last few years; many new buildings ........",opts:["built","were built","have built","have been built"],ans:3,exp:"المباني بُنيت = Passive Present Perfect = have been built."},
  {q:"88) While I ............ in the medical college, I earned extra money as a cook in a restaurant.",opts:["was studying","am studying","would study","will study"],ans:0,exp:"while + Past Continuous = was studying."},
  {q:"89) I finished ............ the mystery novel I bought last month.",opts:["read","to read","reading","to reading"],ans:2,exp:"finish + V-ing = finished reading."},
  {q:"90) The mechanic ............ works on my car is very experienced.",opts:["who he","which","which","who"],ans:3,exp:"mechanic = شخص = who."},
  {q:"91) Alex: Is this Eric's car?<br>Will: Yes, it's ....................",opts:["him","his","he's","he"],ans:1,exp:"it's his = إنها سيارته (ضمير ملكية مستقل)."},
  {q:"92) Jenny wasn't able to come to yesterday's meeting. She ............ take her mother to the dentist.",opts:["could","would","had to","must to"],ans:2,exp:"اضطرت = had to."},
  {q:"93) The cake was sitting on the table as the group of children ............ excitedly.",opts:["entered","enter","are entering","will enter"],ans:0,exp:"as = بينما في الماضي = Past Simple = entered."},
  {q:"94) My mother and ............ will finish the shopping and come home by taxi.",opts:["myself","mine","me","I"],ans:3,exp:"My mother and I = فاعل = I."},
  {q:"95) If I get my car back from the mechanic tomorrow, I ............ to Jordan for the weekend.",opts:["am driven","am going drive","will drive","will driving"],ans:2,exp:"First Conditional = If + Present, will + base verb."},
  {q:"96) Typically, Naif makes breakfast while lunch .......... by his wife.",opts:["made","makes","is made","has made"],ans:2,exp:"lunch بُعمل = Passive Present Simple = is made."},
  {q:"97) I .......... do it if I could, but I am already busy with something else.",opts:["can","will","shall","would"],ans:3,exp:"Second Conditional = would do it if I could."},
  {q:"98) Please remember to say, 'Thank you,' and 'You're welcome', when .......... to the host.",opts:["speaking","you speaking","are speaking","was speaking"],ans:0,exp:"when + V-ing = when speaking."},
  {q:"99) Mr. Brown: What are you doing?<br>Mr. Davis: I'm .......... my car.",opts:["fix","fixing","fixen","fixed"],ans:1,exp:"I'm + V-ing = I'm fixing."},
  {q:"100) Female lions .......... two thirds of their adult size by the time they are two years old.",opts:["reach","reached","have reach","are reaching"],ans:0,exp:"حقيقة علمية = Present Simple = reach."}
]};

function loadData() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(originalData));
}

function buildUI() {
  var data = loadData();
  document.getElementById("metaTitle").value  = data.title  || "";
  document.getElementById("metaLesson").value = data.lesson || "";
  document.getElementById("statQ").textContent   = data.questions.length;
  document.getElementById("statKey").textContent = STORAGE_KEY;

  var list = document.getElementById("qList");
  list.innerHTML = "";

  data.questions.forEach(function(q, i) {
    var item = document.createElement("div");
    item.className = "q-item";
    item.id = "qi-" + i;

    var labels = ["A","B","C","D"];
    var optsHtml = "";
    (q.opts || []).forEach(function(opt, oi) {
      optsHtml += '<div class="opt-row"><span class="opt-lbl">' + labels[oi] + '</span><input type="text" id="opt-' + i + '-' + oi + '" value="' + esc(opt) + '" onchange="markModified(' + i + ')"></div>';
    });

    var correctOpts = "";
    (q.opts || []).forEach(function(_, oi) {
      correctOpts += '<option value="' + oi + '"' + (q.ans === oi ? " selected" : "") + '>' + labels[oi] + '</option>';
    });

    item.innerHTML =
      '<div class="q-item-head">' +
        '<span class="q-num-badge">Q' + (i+1) + '</span>' +
        '<span id="mod-' + i + '" style="display:none" class="modified-dot" title="معدّل"></span>' +
      '</div>' +
      '<div class="q-item-body">' +
        '<div class="field-full"><label>نص السؤال</label><textarea id="qt-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.q) + '</textarea></div>' +
        '<div class="opts-grid">' + optsHtml + '</div>' +
        '<div class="correct-row"><label>الإجابة الصحيحة:</label><select class="correct-sel" id="ans-' + i + '" onchange="markModified(' + i + ')">' + correctOpts + '</select></div>' +
        '<div class="field-full"><label>الشرح</label><textarea id="exp-' + i + '" rows="2" onchange="markModified(' + i + ')">' + esc(q.exp || "") + '</textarea></div>' +
      '</div>';

    list.appendChild(item);
  });
  updateModCount();
}

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");\n}\n\nvar modifiedSet = {};\nfunction markModified(i) {\n  modifiedSet[i] = true;\n  document.getElementById("mod-" + i).style.display = "inline-block";\n  updateModCount();\n}\nfunction updateModCount() {\n  document.getElementById("statMod").textContent = Object.keys(modifiedSet).length;\n}\n\nfunction collectData() {\n  var data = loadData();\n  data.title  = document.getElementById("metaTitle").value.trim();\n  data.lesson = document.getElementById("metaLesson").value.trim();\n  data.questions.forEach(function(q, i) {\n    q.q   = document.getElementById("qt-" + i).value.trim();\n    q.ans = parseInt(document.getElementById("ans-" + i).value);\n    q.exp = document.getElementById("exp-" + i).value.trim();\n    (q.opts || []).forEach(function(_, oi) {\n      q.opts[oi] = document.getElementById("opt-" + i + "-" + oi).value.trim();\n    });\n  });\n  return data;\n}\n\nfunction saveAll() {\n  var data = collectData();\n  try {\n    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));\n    showToast("&#128190; تم الحفظ في localStorage بنجاح!");\n    modifiedSet = {};\n    document.querySelectorAll(".modified-dot").forEach(function(d){ d.style.display = "none"; });\n    updateModCount();\n  } catch(e) {\n    showToast("&#10060; خطأ في الحفظ: " + e.message);\n  }\n}\n\nfunction resetAll() {\n  if (!confirm("هل تريد استعادة البيانات الأصلية؟ سيتم حذف جميع التعديلات.")) return;\n  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}\n  modifiedSet = {};\n  buildUI();\n  showToast("&#10227; تم استعادة البيانات الأصلية");\n}\n\nfunction openPreview() {\n  saveAll();\n  window.open(QUIZ_FILE, "_blank");\n}\n\nfunction showToast(msg) {\n  var t = document.getElementById("toast");\n  t.innerHTML = msg;\n  t.classList.add("show");\n  setTimeout(function(){ t.classList.remove("show"); }, 2800);\n}\n\nbuildUI();\n</script>
</body>
</html>
